:root{--bg:#080F1C;--bg2:#0C1728;--panel:#0E1D33;--panel2:#122641;--line:rgba(120,160,210,.15);--ink:#E8F0FB;--mut:#93A6C0;--mut2:#6C82A0;--cyan:#1CA9E3;--teal:#17B6A7;--green:#26C281;--amber:#E9B949;--red:#E5604D;--mono:'JetBrains Mono',ui-monospace,monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
h1,h3{font-family:'Sora',sans-serif;letter-spacing:-.01em}
.mono{font-family:var(--mono);font-size:12.5px}
.app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
.side{background:var(--bg2);border-right:1px solid var(--line);padding:22px 18px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.brand img{height:26px}.admtag{font-size:11px;color:var(--mut2);letter-spacing:.14em;text-transform:uppercase;margin:14px 0 22px}
.side nav{display:flex;flex-direction:column;gap:3px}
.side nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:var(--mut);cursor:pointer;font-size:13.5px;font-weight:500;transition:.15s}
.side nav a:hover{background:var(--panel);color:var(--ink)}.side nav a.on{background:rgba(28,169,227,.12);color:#fff;box-shadow:inset 0 0 0 1px rgba(28,169,227,.3)}
.side nav a .ic{width:18px;text-align:center;opacity:.9}
.who{margin-top:auto;border-top:1px solid var(--line);padding-top:14px;font-size:12px}
.who button{margin-top:8px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:7px 12px;cursor:pointer;font-weight:600;width:100%}
.main{padding:24px 30px 60px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.topbar h1{font-size:22px;font-weight:800}
.badge{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:6px 12px;border-radius:7px;background:rgba(229,96,77,.14);color:#F19A8C;border:1px solid rgba(229,96,77,.35)}
.viewfade{animation:vf .4s ease}@keyframes vf{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:18px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
.kk{font-size:11px;color:var(--mut2);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:8px}
.kv{font-family:'Sora';font-size:24px;font-weight:800;color:#fff;line-height:1}.kd{font-size:11.5px;color:var(--mut);margin-top:6px}
@media(max-width:1200px){.kpis{grid-template-columns:repeat(3,1fr)!important}}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:2px}
@media(max-width:1000px){.app{grid-template-columns:1fr}.side{display:none}.row2{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
.card h3{font-size:14px;font-weight:700;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center}
.card .csub{font-size:11.5px;color:var(--mut2);margin-bottom:14px}
.tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--cyan);background:rgba(28,169,227,.14);padding:3px 8px;border-radius:6px}
.bars{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.bar{display:grid;grid-template-columns:120px 1fr 40px;align-items:center;gap:10px;font-size:12px}
.bar .bl{color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar .track{height:9px;background:var(--panel2);border-radius:6px;overflow:hidden}.bar .fill{height:100%;border-radius:6px}
.bar .bv{text-align:right;font-family:var(--mono);color:#fff}
.tw{overflow-x:auto;border:1px solid var(--line);border-radius:12px;margin-top:6px}
table{width:100%;border-collapse:collapse}
th,td{padding:11px 14px;text-align:left;font-size:12.5px;border-bottom:1px solid var(--line);white-space:nowrap}
th{background:var(--bg2);color:var(--mut2);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
tr:last-child td{border-bottom:none}tr:hover td{background:rgba(28,169,227,.05)}
td.num{font-family:var(--mono);text-align:right}.up{color:var(--green)}.down{color:var(--red)}
.pill{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.pill.g{background:rgba(38,194,129,.15);color:var(--green)}.pill.a{background:rgba(233,185,73,.15);color:var(--amber)}.pill.r{background:rgba(229,96,77,.15);color:var(--red)}
.chip{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-size:11px;margin:2px 3px 2px 0;font-family:var(--mono)}
.muted{color:var(--mut2)}
.toolbar{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.toolbar input{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 13px;color:var(--ink);font-size:13px;outline:none;min-width:240px}
.toolbar input:focus{border-color:var(--cyan)}
.loading{padding:26px;color:var(--mut2);font-size:13px}.err{color:var(--red)}
#gate{position:fixed;inset:0;background:linear-gradient(160deg,#080F1C,#0C1728);display:flex;align-items:center;justify-content:center;padding:24px}
.gate-box{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:34px 30px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.gate-box img{height:28px;margin-bottom:20px}.gate-t{font-family:'Sora';font-weight:800;font-size:20px;color:#fff;margin-bottom:6px}.gate-s{font-size:13px;color:var(--mut);margin-bottom:22px}
.gate-box input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--ink);font-size:14px;margin-bottom:11px;outline:none}.gate-box input:focus{border-color:var(--cyan)}
.gate-box button{width:100%;background:linear-gradient(120deg,#1CA9E3,#17B6A7);color:#062033;font-weight:700;border:none;border-radius:10px;padding:13px;font-size:15px;cursor:pointer}
.gate-err{color:var(--red);font-size:12.5px;min-height:18px;margin-top:10px}.gate-note{font-size:11px;color:var(--mut2);margin-top:6px}
