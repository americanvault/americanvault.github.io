one account?","One verified identity and one email per person, and one funded HydroBeast account per verified user. More than one account sharing a household or IP triggers a review, not an automatic void: genuine separate traders in the same home or office are welcome after verification. What is prohibited is one person operating multiple accounts, sharing a verified identity, or coordinating trades across accounts."]]],["Rules & account breaches",[["What can cause an account to be breached or closed?","Six things: (1) breaching the maximum daily loss; (2) breaching the maximum overall loss (drawdown); (3) 30 consecutive days with no trading activity; (4) prohibited automation or trading \u2014 EAs/bots, prohibited arbitrage, news trading on a funded account, unauthorized copy-trading, group hedging, or strategies that exploit the simulated environment; (5) identity or account-limit violations \u2014 sharing a verified identity, operating multiple accounts, or coordinating trading across accounts; (6) chargeback abuse. A breach ends the account: on a challenge you fail and may re-attempt; on a funded account it is closed and unrealized or ineligible profit is forfeited, but any payout already approved is still honored."],["How does the maximum daily loss work?","It is measured on your closed-trade balance from the balance you started the day with at 00:00 UTC; open positions do not count. Example: on a $100,000 account with a 5% daily limit, your closed-trade balance may not fall more than $5,000 below that day's starting balance. It resets every day at 00:00 UTC (server turnover)."],["How does the maximum overall loss (drawdown) work?","It is a balance-based floor measured on closed trades. On HydroBeast and 1-Step the floor trails your highest closed balance upward and locks once you are in profit; on 2-Step and 3-Step it is static from your starting balance. Reaching or passing the floor breaches the account."],["What happens if my account is inactive?","Any account \u2014 challenge or funded \u2014 with no trading activity for 30 consecutive days is permanently breached and closed. This applies to every account."],["What are the automation, copy-trading and arbitrage rules?","Expert Advisors and trading bots are not permitted. You may copy trades between your own HydroPips accounts, but mirroring another person's account or a third-party signal service on a funded account is not allowed. Arbitrage \u2014 including latency, feed, and cross-account or cross-broker hedge arbitrage \u2014 and any strategy that profits from simulated pricing or execution rather than real market movement (off-market fills, un-fillable gaps, feed latency) is prohibited."],["What are the news-trading rules?","On funded accounts you may not open or close a position within 5 minutes before or after a high-impact (red-folder) release on the HydroPips economic calendar, for the instruments directly affected by that release. Overnight and weekend holding is allowed; weekend trading is permitted on crypto."],["How do the identity and account limits work?","One verified identity and one email per user, and one funded HydroBeast account per verified user. Identity verification (KYC) is handled by Rise and runs only when you become funded \u2014 on an instant-funded purchase or after passing an evaluation \u2014 for every funded trader alike. More than one account sharing a household or IP triggers a review, not an automatic void \u2014 genuine separate traders in the same home or office are welcome after verification. What is prohibited is one person operating multiple accounts, sharing a verified identity, coordinating (group-hedging) trades across accounts, or using a VPN to misrepresent your location to evade rules."]]],["Getting paid & verified",[["How do I get paid?","Payouts are processed globally through Rise (riseworks.io), in fiat or crypto."],["What is the profit split?","Up to 90%, starting at 80% and rising with account size and TRADEGRADE\u2122."],["How often are payouts, and can I get them faster?","At checkout you pick your payout cycle: 30 days for a lower fee (the launch default), the standard 14 days, or every 7 days as an optional add-on (also redeemable with HydroPoints). Whatever you choose, every trader is treated the same, and once a payout is approved the same processing service level applies to everyone."],["Do you offer refunds?","Fees are non-refundable, except where required by law or where HydroPips fails to provide the purchased product, for example a duplicate charge or an undelivered product. If something is wrong, contact support first and we will make it right. Fraudulent, abusive, or bad-faith chargebacks may result in account closure and permanent ineligibility, and nothing here limits any non-waivable consumer right under applicable law."],["When do I complete identity verification (KYC)?","There is no identity check to sign up or to buy an evaluation. KYC is handled by Rise and runs only when you become funded \u2014 automatically on an instant-funded (HydroBeast) purchase, or once you pass an evaluation. It is the same step for every funded trader, disclosed up front, and you complete it once."]]],["HydroPoints & rewards",[["What are HydroPoints?","HydroPoints (HP) are the currency of HydroPower, the Osirin loyalty program. You earn HP on purchases at TDC Academy and HydroPips and on verified funded-account milestones, and you redeem them only for HydroPips prop-firm products."],["How do I earn HydroPoints?","One HP per $1 on one-time purchases (challenges, add-ons, one-off TDC products) and 2 HP per $1 on subscription renewals. Founding Members earn 3x on their first purchase and 2x for life. You also earn milestone HP on funded activity: 300 for your first payout, 100 for each additional payout, 75 for every 10 banked trading days, 50 for passing a challenge phase, and 250 for a referral who completes a purchase. Points post only on completed, non-refunded transactions and server-verified account events."],["What can I redeem HydroPoints for?","HydroPoints redeem only for HydroPips products \u2014 never cash, and never TDC products. The catalog includes discounts (25% off from 200 HP, 50% off from 400 HP), a free full reset (600 HP), the optional 7-day first-payout add-on (300 HP), a +5% split on your next payout (600 HP), free 3-Step challenges (450 HP for 5K up to 1,300 HP for 50K), and HydroBeast Pro instant-funded accounts (750 HP for 5K up to 1,600 HP for 50K, Pro variant only). Every redemption is a request that is reviewed and approved before it is provisioned; your points are held while it is pending and released back if it is denied."],["Do HydroPoints expire?","Yes. HydroPoints expire 12 months after they are earned, oldest first. We notify you about 30 days before a batch is due to expire so you have time to redeem."],["What happens to my points on a refund or chargeback?","Points earned on a purchase that is later refunded or charged back are reversed. A chargeback also forfeits any remaining balance. Points already spent on a redeemed reward are not returned."],["Do HydroPoints have cash value?","No. HydroPoints have no cash value, cannot be exchanged for cash, and are non-transferable \u2014 they cannot be sold, gifted, or combined across accounts. They are a loyalty perk, not a financial asset. A redeemed challenge or funded account is still a simulated evaluation subject to every HydroPips rule; passing and payout are never guaranteed."]]],["Platforms & trading",[["Which platforms can I trade on?","Match-Trader, TradeLocker, cTrader, and DXtrade \u2014 all on equal footing, with TradingView charting across them."],["What leverage do I get?","Forex up to 1:50 on HydroBeast and 1-Step, and up to 1:100 on 2-Step and 3-Step. Indices and metals up to 1:20, and crypto up to 1:2 on every account."],["When does the daily loss limit reset?","At 00:00 UTC each day (server turnover)."],["Can I trade from the United States?","Yes. :root{--navy:#0A1626;--navy2:#0E2038;--navy3:#12294D;--panel:#0F2440;--cyan:#1CA9E3;--teal:#17B6A7;--ice:#CADCFC;--ink:#E8F0FB;--mut:#93A6C0;--mut2:#6C82A0;--line:rgba(120,160,210,.16);--grad:linear-gradient(120deg,#1CA9E3,#17B6A7);--heading:#fff;--soft:rgba(255,255,255,.03);--soft2:rgba(255,255,255,.07);--header-bg:rgba(10,22,38,.82);--shadow:rgba(0,0,0,.35);}
:root[data-theme=light]{--navy:#F4F8FC;--navy2:#fff;--navy3:#E9F1FA;--panel:#fff;--ink:#22324A;--mut:#54637A;--mut2:#7E8DA3;--line:rgba(20,45,80,.13);--ice:#12294D;--heading:#0C1B30;--soft:rgba(20,60,110,.045);--soft2:rgba(20,60,110,.08);--header-bg:rgba(255,255,255,.86);--shadow:rgba(30,50,90,.13);}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--navy);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .4s}
:root[data-theme=light] body{background:linear-gradient(180deg,#F4F8FC,#EAF1F9)}
h1,h2,h3,h4{font-family:'Sora','Inter',sans-serif;letter-spacing:-.02em;line-height:1.12}
a{color:inherit;text-decoration:none;cursor:pointer}
button{font-family:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}
.grad-txt{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:15px;padding:13px 26px;border-radius:12px;cursor:pointer;border:none;transition:.2s;position:relative;overflow:hidden}
.btn-p{background:var(--grad);color:#062033;box-shadow:0 8px 30px rgba(28,169,227,.32)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(28,169,227,.45)}
.btn-p::after{content:"";position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);transform:skewX(-20deg);transition:left .6s}
.btn-p:hover::after{left:130%}
.btn-g{background:var(--soft2);color:var(--ink);border:1px solid var(--line)}
.btn-g:hover{border-color:var(--cyan);transform:translateY(-2px)}
.eyebrow{font-size:12.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan)}
.sec-pad{padding:92px 0;position:relative}
.rv{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}
.rv.in{opacity:1;transform:none}
.viewfade{animation:vfade .5s ease}
@keyframes vfade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
header{position:sticky;top:0;z-index:50;background:rgba(10,22,38,.92)!important;backdrop-filter:blur(14px);border-bottom:1px solid rgba(120,160,210,.18)}
nav{display:flex;align-items:center;justify-content:space-between;height:70px}
nav .logo img{height:30px;display:block}
nav ul{display:flex;gap:30px;list-style:none}
nav ul a{font-size:14.5px;font-weight:500;color:#9fb0c8;transition:.15s}
nav ul a:hover,nav ul a.on{color:#fff}
.nav-cta{display:flex;gap:12px;align-items:center}
.theme-btn{background:rgba(255,255,255,.08);border:1px solid rgba(159,176,200,.3);color:#E8F0FB;width:40px;height:40px;border-radius:10px;cursor:pointer;font-size:17px}
.theme-btn:hover{background:rgba(255,255,255,.15);border-color:var(--cyan)}
.menu-btn{display:none;background:none;border:none;color:#E8F0FB;font-size:26px;cursor:pointer}
@media(max-width:900px){nav ul{display:none;position:absolute;top:70px;left:0;right:0;flex-direction:column;background:var(--navy2);padding:18px 24px;border-bottom:1px solid var(--line);gap:16px}nav ul.open{display:flex}nav ul a{color:var(--ink)}.menu-btn{display:block}}
.hero{position:relative;padding:104px 0 92px;overflow:hidden}
.hero-mesh{position:absolute;inset:0;background:radial-gradient(700px 460px at 80% 0%,rgba(28,169,227,.22),transparent 60%),radial-gradient(620px 460px at 10% 100%,rgba(23,182,167,.2),transparent 60%),radial-gradient(500px 400px at 60% 60%,rgba(28,169,227,.1),transparent 60%);background-size:200% 200%;animation:mesh 16s ease-in-out infinite;pointer-events:none}
@keyframes mesh{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:54px 54px;-webkit-mask-image:radial-gradient(circle at 50% 30%,#000,transparent 72%);mask-image:radial-gradient(circle at 50% 30%,#000,transparent 72%);opacity:.5}
.hero-wrap{position:relative}
.hero-inner{max-width:640px}
.pill{display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--ice);background:rgba(28,169,227,.1);border:1px solid rgba(28,169,227,.32);padding:7px 15px;border-radius:100px;margin-bottom:26px}
.pill .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 4px rgba(23,182,167,.22);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(23,182,167,.22)}50%{box-shadow:0 0 0 7px rgba(23,182,167,0)}}
.hero h1{font-size:clamp(40px,6vw,64px);font-weight:800;margin-bottom:22px}
.hero p.lead{font-size:clamp(17px,2.2vw,20px);color:var(--mut);margin-bottom:32px}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap}
.hero-note{margin-top:20px;font-size:13.5px;color:var(--mut2);display:flex;gap:22px;flex-wrap:wrap}
.hero-note span{display:flex;align-items:center;gap:7px}.chk{color:var(--teal);font-weight:800}
.anim1,.anim2,.anim3,.anim4,.anim5,.anim6{opacity:0;animation:up .7s cubic-bezier(.2,.7,.2,1) forwards}
.anim2{animation-delay:.08s}.anim3{animation-delay:.16s}.anim4{animation-delay:.26s}.anim5{animation-delay:.36s}.anim6{animation-delay:.46s}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.hero-visual{position:absolute;top:70px;right:0;width:360px;opacity:0;animation:up .8s .3s cubic-bezier(.2,.7,.2,1) forwards}
.hv-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:24px;box-shadow:0 30px 70px var(--shadow);transform:rotate(2deg);animation:floaty 6s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:rotate(2deg) translateY(0)}50%{transform:rotate(2deg) translateY(-12px)}}
.hv-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hv-lbl{font-size:12px;color:var(--mut2);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.hv-grade{font-size:11px;font-weight:800;color:var(--teal);background:rgba(23,182,167,.14);padding:4px 9px;border-radius:7px}
.hv-bal{font-family:'Sora';font-size:34px;font-weight:800;color:var(--heading)}
.hv-pl{color:var(--teal);font-weight:700;font-size:15px;margin-bottom:10px}.hv-pl span{color:var(--mut2);font-weight:500}
.hv-spark{width:100%;height:58px;display:block;margin-bottom:12px}
.hv-row{display:flex;justify-content:space-between;font-size:13px;color:var(--mut);padding:8px 0;border-top:1px dashed var(--line)}.hv-row b{color:var(--heading)}
.hv-chip{position:absolute;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 14px;font-size:12.5px;font-weight:700;box-shadow:0 12px 30px var(--shadow);animation:floaty2 5s ease-in-out infinite}
.hv-chip.c1{top:-6px;left:-40px;color:var(--teal)}
.hv-chip.c2{bottom:16px;left:-30px;color:var(--cyan);animation-delay:1s}
@keyframes floaty2{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@media(max-width:1000px){.hero-visual{display:none}.hero-inner{max-width:100%}}
.sh{max-width:680px;margin-bottom:50px}
.sh h2{font-size:clamp(29px,4vw,42px);font-weight:800;margin:14px 0 16px}.sh p{font-size:17px;color:var(--mut)}
.sh.center{margin-left:auto;margin-right:auto;text-align:center}
.cfg{max-width:1000px;margin:0 auto}
