l,e[1]))))))}var vS=[["Getting started",[["What is HydroPips?","A funded-trader firm. Show your skill in a clear evaluation, and when you pass you trade a funded account and keep the majority of the profit, up to a 90% split."],["Which challenge should I choose?","HydroBeast is our flagship: instant-funded, strictest rules, best terms. Current is the most popular and balanced. Rapids is faster and the only path with Pay-Later. Estuary has the lowest entry price."],["How does Pay-Later work?","On Rapids you split the fee: 50% up front and 50% once you pass. Available on Rapids only."],["Can I open more than one account?","One verified identity and one email per person, and one funded HydroBeast account per verified user. More than one account sharing a household or IP triggers a review, not an automatic void: genuine separate traders in the same home or office are welcome after verification. What is prohibited is one person operating multiple accounts, sharing a verified identity, or coordinating trades across accounts."]]],["Rules & account breaches",[["What can cause an account to be breached or closed?","Six things: (1) breaching the maximum daily loss; (2) breaching the maximum overall loss (drawdown); (3) 30 consecutive days with no trading activity; (4) prohibited automation or trading \u2014 EAs/bots, prohibited arbitrage, news trading on a funded account, unauthorized copy-trading, group hedging, or strategies that exploit the simulated environment; (5) identity or account-limit violations \u2014 sharing a verified identity, operating multiple accounts, or coordinating trading across accounts; (6) chargeback abuse. A breach ends the account: on a challenge you fail and may re-attempt; on a funded account it is closed and unrealized or ineligible profit is forfeited, but any payout already approved is still honored."],["How does the maximum daily loss work?","It is measured on your closed-trade balance from the balance you started the day with at 00:00 UTC; open positions do not count. Example: on a $100,000 account with a 5% daily limit, your closed-trade balance may not fall more than $5,000 below that day's starting balance. It resets every day at 00:00 UTC (server turnover)."],["How does the maximum overall loss (drawdown) work?","It is a balance-based floor measured on closed trades. On HydroBeast and Rapids the floor trails your highest closed balance upward and locks once you are in profit; on Current and Estuary it is static from your starting balance. Reaching or passing the floor breaches the account."],["What happens if my account is inactive?","Any account \u2014 challenge or funded \u2014 with no trading activity for 30 consecutive days is permanently breached and closed. This applies to every account."],["What are the automation, copy-trading and arbitrage rules?","Expert Advisors and trading bots are not permitted. You may copy trades between your own HydroPips accounts, but mirroring another person's account or a third-party signal service on a funded account is not allowed. Arbitrage \u2014 including latency, feed, and cross-account or cross-broker hedge arbitrage \u2014 and any strategy that profits from simulated pricing or execution rather than real market movement (off-market fills, un-fillable gaps, feed latency) is prohibited."],["What are the news-trading rules?","On funded accounts you may not open or close a position within 5 minutes before or after a high-impact (red-folder) release on the HydroPips economic calendar, for the instruments directly affected by that release. Overnight and weekend holding is allowed; weekend trading is permitted on crypto."],["How do the identity and account limits work?","One verified identity and one email per user, and one funded HydroBeast account per verified user. Identity verification (KYC) is handled by Rise and runs only when you become funded \u2014 on an instant-funded purchase or after passing an evaluation \u2014 for every funded trader alike. More than one account sharing a household or IP triggers a review, not an automatic void \u2014 genuine separate traders in the same home or office are welcome after verification. What is prohibited is one person operating multiple accounts, sharing a verified identity, coordinating (group-hedging) trades across accounts, or using a VPN to misrepresent your location to evade rules."]]],["Getting paid & verified",[["How do I get paid?","Payouts are processed globally through Rise (riseworks.io), in fiat or crypto."],["What is the profit split?","Up to 90%, starting at 80% and rising with account size and TRADEGRADE\u2122."],["How often are payouts, and can I get them faster?","During the founding launch, every account pays out on a 30-day cycle. After our first 2,500 members, you pick your cycle at checkout: the standard 14 days, a 30-day cycle for a lower fee, or every 7 days as an optional add-on (also redeemable with HydroPoints). Whatever you choose, every approved payout is processed on the same standard timeline."],["Do you offer refunds?","Fees are non-refundable, except where required by law or where HydroPips fails to provide the purchased product, for example a duplicate charge or an undelivered product. If something is wrong, contact support first and we will make it right. Fraudulent, abusive, or bad-faith chargebacks may result in account closure and permanent ineligibility, and nothing here limits any non-waivable consumer right under applicable law."],["When do I complete identity verification (KYC)?","There is no identity check to sign up or to buy an evaluation. KYC is handled by Rise and runs only when you become funded \u2014 automatically on an instant-funded (HydroBeast) purchase, or once you pass an evaluation. It is the same step for every funded trader, disclosed up front, and you complete it once."]]],["HydroPoints & rewards",[["What are HydroPoints?","HydroPoints (HP) are the currency of HydroPower, the Osirin loyalty program. You earn HP on purchases at TDC Academy and HydroPips and on verified funded-account milestones, and you redeem them only for HydroPips prop-firm products."],["How do I earn HydroPoints?","One HP per $1 on one-time purchases (challenges, add-ons, one-off TDC products) and 2 HP per $1 on subscription renewals. Founding Members earn 3x on their first purchase and 2x for life. You also earn milestone HP on funded activity: 300 for your first payout, 100 for each additional payout, 75 for every 10 banked trading days, 50 for passing a challenge phase, and 250 for a referral who completes a purchase. Points post only on completed, non-refunded transactions and server-verified account events."],["What can I redeem HydroPoints for?","HydroPoints redeem only for HydroPips products \u2014 never cash, and never TDC products. The catalog includes discounts (25% off from 200 HP, 50% off from 400 HP), a free full reset (600 HP), the optional 7-day first-payout add-on (300 HP), a +5% split on your next payout (600 HP), free Estuary challenges (450 HP for 5K up to 1,300 HP for 50K), and HydroBeast Pro instant-funded accounts (750 HP for 5K up to 1,600 HP for 50K, Pro variant only). Every redemption is a request that is reviewed and approved before it is provisioned; your points are held while it is pending and released back if it is denied."],["Do HydroPoints expire?","Yes. HydroPoints expire 12 months after they are earned, oldest first. We notify you about 30 days before a batch is due to expire so you have time to redeem."],["What happens to my points on a refund or chargeback?","Points earned on a purchase that is later refunded or charged back are reversed. A chargeback also forfeits any remaining balance. Points already spent on a redeemed reward are not returned."],["Do HydroPoints have cash value?","No. HydroPoints have no cash value, cannot be exchanged for cash, and are non-transferable \u2014 they cannot be sold, gifted, or combined across accounts. They are a loyalty perk, not a financial asset. A redeemed challenge or funded account is still a simulated evaluation subject to every HydroPips rule; passing and payout are never guaranteed."]]],["Platforms & trading",[["Which platforms can I trade on?","TradeLocker, cTrader, and DXtrade \u2014 all on equal footing, with TradingView charting across them."],["What leverage do I get?","Forex up to 1:50 on HydroBeast and Rapids, and up to 1:100 on Current and Estuary. Indices and metals up to 1:20, and crypto up to 1:2 on every account."],["When does the daily loss limit reset?","At 00:00 UTC each day (server turnover)."],["Can I trade from the United States?","Yes. HydroPips welcomes traders worldwide, including the US."]]]];function bS({q:e,a:t,open:n}){let[a,i]=(0,l.useState)(!!n);return l.default.createElement("div",{className:"acc"+(a?" open":"")},l.default.createElement("button",{className:"accq",onClick:()=>i(!a)},e,l.default.createElement("span",{className:"accx"},"+")),a&&l.default.createElement("div",{className:"acca"},t))}function wS(){return l.default.createElement("section",{className:"pageview"},l.default.createElement("div",{className:"phead"},l.default.createElement("div",{className:"wrap"},l.default.createElement("span",{className:"eyebrow"},"FAQ"),l.default.createElement("h1",null,"Frequently asked questions"),l.default.createElement("p",null,"How the challenges work, how you get paid, and what you can trade."))),l.default.createElement("div",{className:"wrap sec-pad"},vS.map((e,t)=>l.default.createElement("div",{key:t,className:"faq-group"},l.default.createElement("div",{className:"gh"},e[0]),e[1].map((n,a)=>l.default.createElement(bS,{key:a,q:n[0],a:n[1],open:t===0&&a===0}))))))}function SS({nav:e,onContinue:t}){return l.default.createElement(l.default.Fragment,null,l.default.createElement("section",{className:"hero"},l.default.createElement("div",{className:"hero-mesh"}),l.default.createElement("div",{className:"hero-grid"}),l.default.createElement("div",{className:"wrap hero-wrap"},l.de body{font-family:'Inter',system-ui,sans-serif;background:var(--navy);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .4s}
:root[data-theme=light] body{background:linear-gradient(180deg,#F4F8FC,#EAF1F9)}
h1,h2,h3,h4{font-family:'Sora','Inter',sans-serif;letter-spacing:-.02em;line-height:1.12}
a{color:inherit;text-decoration:none;cursor:pointer}
button{font-family:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}
.grad-txt{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:15px;padding:13px 26px;border-radius:12px;cursor:pointer;border:none;transition:.2s;position:relative;overflow:hidden}
.btn-p{background:var(--grad);color:#062033;box-shadow:0 8px 30px rgba(28,169,227,.32)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(28,169,227,.45)}
.btn-p::after{content:"";position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);transform:skewX(-20deg);transition:left .6s}
.btn-p:hover::after{left:130%}
.btn-g{background:var(--soft2);color:var(--ink);border:1px solid var(--line)}
.btn-g:hover{border-color:var(--cyan);transform:translateY(-2px)}
.eyebrow{font-size:12.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan)}
.sec-pad{padding:92px 0;position:relative}
.rv{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}
.rv.in{opacity:1;transform:none}
.viewfade{animation:vfade .5s ease}
@keyframes vfade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
header{position:sticky;top:0;z-index:50;background:rgba(10,22,38,.92)!important;backdrop-filter:blur(14px);border-bottom:1px solid rgba(120,160,210,.18)}
nav{display:flex;align-items:center;justify-content:space-between;height:70px}
nav .logo img{height:30px;display:block}
nav ul{display:flex;gap:30px;list-style:none}
nav ul a{font-size:14.5px;font-weight:500;color:#9fb0c8;transition:.15s}
nav ul a:hover,nav ul a.on{color:#fff}
.nav-cta{display:flex;gap:12px;align-items:center}
.theme-btn{background:rgba(255,255,255,.08);border:1px solid rgba(159,176,200,.3);color:#E8F0FB;width:40px;height:40px;border-radius:10px;cursor:pointer;font-size:17px}
.theme-btn:hover{background:rgba(255,255,255,.15);border-color:var(--cyan)}
.menu-btn{display:none;background:none;border:none;color:#E8F0FB;font-size:26px;cursor:pointer}
@media(max-width:900px){nav ul{display:none;position:absolute;top:70px;left:0;right:0;flex-direction:column;background:var(--navy2);padding:18px 24px;border-bottom:1px solid var(--line);gap:16px}nav ul.open{display:flex}nav ul a{color:var(--ink)}.menu-btn{display:block}}
.hero{position:relative;padding:104px 0 92px;overflow:hidden}
.hero-mesh{position:absolute;inset:0;background:radial-gradient(700px 460px at 80% 0%,rgba(28,169,227,.22),transparent 60%),radial-gradient(620px 460px at 10% 100%,rgba(23,182,167,.2),transparent 60%),radial-gradient(500px 400px at 60% 60%,rgba(28,169,227,.1),transparent 60%);background-size:200% 200%;animation:mesh 16s ease-in-out infinite;pointer-events:none}
@keyframes mesh{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:54px 54px;-webkit-mask-image:radial-gradient(circle at 50% 30%,#000,transparent 72%);mask-image:radial-gradient(circle at 50% 30%,#000,transparent 72%);opacity:.5}
.hero-wrap{position:relative}
.hero-inner{max-width:640px}
.pill{display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--ice);background:rgba(28,169,227,.1);border:1px solid rgba(28,169,227,.32);padding:7px 15px;border-radius:100px;margin-bottom:26px}
.pill .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 4px rgba(23,182,167,.22);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(23,182,167,.22)}50%{box-shadow:0 0 0 7px rgba(23,182,167,0)}}
.hero h1{font-size:clamp(40px,6vw,64px);font-weight:800;margin-bottom:22px}
.hero p.lead{font-size:clamp(17px,2.2vw,20px);color:var(--mut);margin-bottom:32px}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap}
.hero-note{margin-top:20px;font-size:13.5px;color:var(--mut2);display:flex;gap:22px;flex-wrap:wrap}
.hero-note span{display:flex;align-items:center;gap:7px}.chk{color:var(--teal);font-weight:800}
.anim1,.anim2,.anim3,.anim4,.anim5,.anim6{opacity:0;animation:up .7s cubic-bezier(.2,.7,.2,1) forwards}
.anim2{animation-delay:.08s}.anim3{animation-delay:.16s}.anim4{animation-delay:.26s}.anim5{animation-delay:.36s}.anim6{animation-delay:.46s}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.hero-visual{position:absolute;top:70px;right:0;width:360px;opacity:0;animation:up .8s .3s cubic-bezier(.2,.7,.2,1) forwards}
.hv-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:24px;box-shadow:0 30px 70px var(--shadow);transform:rotate(2deg);animation:floaty 6s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:rotate(2deg) translateY(0)}50%{transform:rotate(2deg) translateY(-12px)}}
.hv-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hv-lbl{font-size:12px;color:var(--mut2);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.hv-grade{font-size:11px;font-weight:800;color:var(--teal);background:rgba(23,182,167,.14);padding:4px 9px;border-radius:7px}
.hv-bal{font-family:'Sora';font-size:34px;font-weight:800;color:var(--heading)}
.hv-pl{color:var(--teal);font-weight:700;font-size:15px;margin-bottom:10px}.hv-pl span{color:var(--mut2);font-weight:500}
.hv-spark{width:100%;height:58px;display:block;margin-bottom:12px}
.hv-row{display:flex;justify-content:space-between;font-size:13px;color:var(--mut);padding:8px 0;border-top:1px dashed var(--line)}.hv-row b{color:var(--heading)}
.hv-chip{position:absolute;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 14px;font-size:12.5px;font-weight:700;box-shadow:0 12px 30px var(--shadow);animation:floaty2 5s ease-in-out infinite}
.hv-chip.c1{top:-6px;left:-40px;color:var(--teal)}
.hv-chip.c2{bottom:16px;left:-30px;color:var(--cyan);animation-delay:1s}
@keyframes floaty2{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@media(max-width:1000px){.hero-visual{display:none}.hero-inner{max-width:100%}}
.sh{max-width:680px;margin-bottom:50px}
.sh h2{font-size:clamp(29px,4vw,42px);font-weight:800;margin:14px 0 16px}.sh p{font-size:17px;color:var(--mut)}
.sh.center{margin-left:auto;margin-right:auto;text-align:center}
.cfg{max-width:1000px;margin:0 auto}
.cstep{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin:18px 0 10px}.cstep:first-child{margin-top:0}
.t-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.s-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.p-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.opt{position:relative;border:1px solid var(--line);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:.18s;background:var(--soft);font-size:14px;font-weight:700;color:var(--ink)}
.opt small{display:block;font-weight:500;color:var(--mut2);font-size:11px;margin-top:3px}
.opt.sel{border-color:var(--cyan);background:rgba(28,169,227,.1);box-shadow:0 0 0 1px var(--cyan);transform:translateY(-2px)}
.opt:hover{border-color:rgba(28,169,227,.45);transform:translateY(-2px)}
.opt.proopt{border-color:rgba(23,182,167,.5)}.opt.proopt.sel{box-shadow:0 0 0 1px var(--teal)}
.probadge{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:linear-gradient(120deg,#17B6A7,#1CA9E3);color:#062033;font-size:9px;font-weight:800;letter-spacing:.08em;padding:2px 8px;border-radius:100px}
.reveal{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:24px;background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 8px 26px var(--shadow)}
.rev-col{padding:22px 24px}.rev-col.funded{border-left:1px solid var(--line)}
.rev-col .rh{display:flex;align-items:center;gap:10px;margin-bottom:6px}.rev-col .dotc{width:9px;height:9px;border-radius:50%}.rev-col.eval .dotc{background:var(--cyan)}.rev-col.funded .dotc{background:var(--teal)}
.rev-col h4{font-size:16px;font-weight:700}.rev-col .rsub{font-size:12.5px;color:var(--mut2);margin-bottom:12px}
.rrow{display:flex;justify-content:space-between;gap:14px;border-bottom:1px dashed var(--line);padding:11px 0;font-size:14px;color:var(--mut)}.rrow:last-child{border-bottom:none}.rrow b{color:var(--heading);font-weight:600;text-align:right}.rrow.hi b{color:var(--teal)}
.priceband{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;background:linear-gradient(120deg,var(--navy3),var(--navy2));border:1px solid rgba(28,169,227,.3);border-radius:16px;padding:20px 24px;margin-top:20px}
.priceband .k{font-size:12px;color:var(--mut2)}.priceband .v{font-family:'Sora';font-size:30px;font-weight:800;color:var(--heading);line-height:1.1}.priceband .v small{font-size:13px;font-weight:500;color:var(--mut)}
.pop{display:inline-block;animation:pop .35s ease}@keyframes pop{0%{transform:scale(.8);opacity:.3}100%{transform:scale(1);opacity:1}}
.priceband .paylater{font-size:12px;color:var(--teal);font-weight:600;margin-top:3px}
@media(max-width:820px){.t-row,.p-row{grid-template-columns:repeat(2,1fr)}.s-row{grid-template-columns:repeat(3,1fr)}.reveal{grid-template-columns:1fr}.rev-col.funded{border-left:none;border-top:1px solid var(--line)}}
.feat{background:linear-gradient(180deg,var(--navy2),var(--navy))}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.fcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px 24px;transition:.2s;box-shadow:0 6px 22px var(--shadow)}
.fcard:hover{border-color:rgba(28,169,227,.35);transform:translateY(-4px)}
.fic{width:46px;height:46px;border-radius:12px;background:rgba(28,169,227,.12);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px}
.fcard h3{font-size:18px;font-weight:700;margin-bottom:9px}.fcard p{font-size:14px;color:var(--mut)}
@media(max-width:860px){.fgrid{grid-template-columns:1fr}}
.tg{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center}
.tg-panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:8px;box-shadow:0 12px 34px var(--shadow)}
.tg-bar{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:13px;margin:6px}
.tg-bar .g{font-family:'Sora';font-weight:800;font-size:20px;width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center}
.tg-bar .tx{font-size:13.5px;color:var(--mut)}.tg-bar .tx b{color:var(--heading);display:block;font-size:14.5px}
.tg-a{background:rgba(23,182,167,.1)}.tg-a .g{background:var(--teal);color:#052a26}.tg-b{background:rgba(28,169,227,.08)}.tg-b .g{background:var(--cyan);color:#052033}.tg-c{background:var(--soft)}.tg-c .g{background:#33507a;color:#fff}
.tglist{list-style:none;margin-top:22px;display:flex;flex-direction:column;gap:14px}.tglist li{display:flex;gap:13px;font-size:15px;color:var(--mut)}.tglist b{color:var(--heading)}.tglist .chk{font-size:18px}
@media(max-width:860px){.tg{grid-template-columns:1fr;gap:34px}}
.logos-row{display:flex;flex-wrap:wrap;gap:14px}
.chipx{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 22px;font-weight:700;font-size:16px;color:var(--ice);flex:1;min-width:150px;text-align:center;transition:.2s;box-shadow:0 6px 20px var(--shadow)}
.chipx:hover{border-color:rgba(28,169,227,.4);color:var(--heading);transform:translateY(-3px)}.chipx small{display:block;font-size:11.5px;font-weight:500;color:var(--mut2);margin-top:3px}
.eco{background:linear-gradient(180deg,#0A1626,#0E2038)!important}
.eco .sh h2{color:#fff}.eco .sh p,.eco .eco-card p{color:#93A6C0}
.eco-flow{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;align-items:stretch;gap:14px}
.eco-card{background:#0F2440;border:1px solid rgba(120,160,210,.16);border-radius:18px;padding:30px 26px;transition:.25s}
.eco-card:hover{border-color:rgba(28,169,227,.4);transform:translateY(-4px)}
.eco-card .tag{font-size:11.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6C82A0}
.eco-card img{height:32px;margin:14px 0 16px;display:block}.eco-card.mid img{height:30px}
.eco-card .role{display:inline-block;margin-top:14px;font-size:12px;font-weight:700;color:var(--cyan);background:rgba(28,169,227,.1);padding:4px 11px;border-radius:8px}
.eco-arrow{display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:26px}
.eco-card.hl{border-color:rgba(28,169,227,.45);box-shadow:0 0 0 1px rgba(28,169,227,.25),0 20px 50px rgba(0,0,0,.35)}
.eco-note{text-align:center;margin-top:30px;font-size:13.5px;color:#8194ac;max-width:800px;margin:30px auto 0}
@media(max-width:860px){.eco-flow{grid-template-columns:1fr}.eco-arrow{transform:rotate(90deg);padding:2px 0}}
.cta{text-align:center}
.cta-box{background:linear-gradient(120deg,var(--navy3),var(--navy2));border:1px solid rgba(28,169,227,.3);border-radius:24px;padding:62px 40px;position:relative;overflow:hidden;box-shadow:0 18px 50px rgba(28,120,184,.12)}
.cta-box h2{font-size:clamp(29px,4.5vw,44px);font-weight:800;margin-bottom:16px}.cta-box p{font-size:18px;color:var(--mut);max-width:560px;margin:0 auto 30px}
footer{background:#0A1626!important;border-top:1px solid rgba(120,160,210,.16);padding:62px 0 34px}
.foot-top{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:34px;margin-bottom:44px}
.foot-brand img{height:30px;margin-bottom:16px}.foot-brand p{font-size:13.5px;color:#8194ac;max-width:280px}
.fcol h4{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#8194ac;margin-bottom:14px}.fcol a{display:block;font-size:14px;color:#8194ac;margin-bottom:9px}.fcol a:hover{color:var(--cyan)}
.family{border-top:1px solid rgba(120,160,210,.16);border-bottom:1px solid rgba(120,160,210,.16);padding:26px 0;margin:6px 0 26px}
.family .lbl{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#8194ac;text-align:center;margin-bottom:18px}
.family-row{display:flex;align-items:center;justify-content:center;gap:44px;flex-wrap:wrap}.family-row img{height:30px;opacity:.9}
.foot-bot{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-size:12.5px;color:#8194ac}
.disc{font-size:11.5px;color:#8194ac;line-height:1.7;margin-top:22px;border-top:1px solid rgba(120,160,210,.16);padding-top:22px}
@media(max-width:860px){.foot-top{grid-template-columns:1fr 1fr}.foot-brand{grid-column:1/-1}}
.phead{padding:70px 0 40px;position:relative;overflow:hidden;border-bottom:1px solid var(--line)}
.phead .eyebrow{margin-bottom:12px;display:block}.phead h1{font-size:clamp(32px,5vw,50px);font-weight:800}.phead p{font-size:17px;color:var(--mut);max-width:640px;margin-top:14px}
.rule-sec{max-width:900px;margin:0 auto}
.ptbl-wrap{margin-top:6px;border:1px solid var(--line);border-radius:16px;overflow:hidden;overflow-x:auto;box-shadow:0 6px 22px var(--shadow)}
table.ptbl{width:100%;border-collapse:collapse;min-width:960px}
.ptbl th,.ptbl td{padding:13px 16px;text-align:left;font-size:13.5px;border-bottom:1px solid var(--line);white-space:nowrap}
.tbl-note{font-size:12.5px;color:var(--mut2);margin-top:12px;line-height:1.6}
.ptbl th{background:var(--navy3);color:var(--ice);font-weight:700;font-size:12.5px;letter-spacing:.05em;text-transform:uppercase}
.ptbl td:first-child{font-weight:700;color:var(--heading)}.ptbl tr:last-child td{border-bottom:none}
.callout{background:rgba(28,169,227,.07);border:1px solid rgba(28,169,227,.24);border-radius:14px;padding:18px 22px;font-size:14px;color:var(--ice);margin:18px 0}
.rule-block{margin-bottom:24px}.rule-block h3{font-size:19px;font-weight:700;margin-bottom:8px;display:flex;gap:10px;align-items:center}
.rule-block .rn{width:28px;height:28px;border-radius:8px;background:rgba(28,169,227,.14);color:var(--cyan);font-size:14px;display:flex;align-items:center;justify-content:center;font-family:'Sora';font-weight:800;flex:none}
.rule-block p{color:var(--mut);font-size:14.5px}
.legal-date{font-size:12.5px;color:var(--mut2);margin-top:14px;font-weight:600}
.faq-group{max-width:840px;margin:0 auto 40px}.faq-group .gh{font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--cyan);margin:0 0 16px 4px}
.acc{border:1px solid var(--line);border-radius:14px;margin-bottom:12px;background:var(--panel);overflow:hidden;box-shadow:0 4px 16px var(--shadow)}
.accq{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:20px 24px;font-weight:600;font-size:16px;display:flex;justify-content:space-between;align-items:center;color:var(--ink);gap:16px}
.accx{font-size:24px;font-weight:400;color:var(--cyan);transition:.2s}.acc.open .accx{transform:rotate(45deg)}
.acca{padding:0 24px 22px;font-size:14.5px;color:var(--mut);animation:up .3s ease}
.co-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:30px;align-items:start;max-width:1000px;margin:0 auto}
.co-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px;box-shadow:0 6px 22px var(--shadow)}
.co-step{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin-bottom:6px}
.pay-row{display:flex;flex-direction:column;gap:12px}
.pay{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:12px;padding:16px 18px;cursor:pointer;transition:.15s;background:var(--soft)}
.pay.sel{border-color:var(--cyan);background:rgba(28,169,227,.08);box-shadow:0 0 0 1px var(--cyan)}
.pay .picon{width:38px;height:38px;border-radius:10px;background:rgba(28,169,227,.12);display:flex;align-items:center;justify-content:center;font-size:19px}
.pay .pt b{display:block;color:var(--heading);font-size:15px}.pay .pt span{font-size:12.5px;color:var(--mut2)}
.pay .rad{margin-left:auto;width:18px;height:18px;border-radius:50%;border:2px solid var(--mut2)}.pay.sel .rad{border-color:var(--cyan);background:radial-gradient(circle,var(--cyan) 42%,transparent 46%)}
.sum .row{display:flex;justify-content:space-between;font-size:14px;padding:11px 0;border-bottom:1px dashed var(--line);color:var(--mut)}.sum .row b{color:var(--heading);font-weight:600}
.posched{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:4px 0 14px}
.posched3{grid-template-columns:repeat(3,1fr)}
.po{border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer;background:var(--soft);transition:.15s}.po b{display:block;font-size:13.5px;color:var(--heading)}.po span{font-size:11px;color:var(--mut2)}
.po.sel{border-color:var(--cyan);background:rgba(28,169,227,.1);box-shadow:0 0 0 1px var(--cyan)}
.po.dis{opacity:.4;cursor:not-allowed;pointer-events:none}
.fbanner{background:linear-gradient(90deg,#0A1626,#12294D,#0A1626);border-bottom:1px solid rgba(28,169,227,.3);overflow:hidden;white-space:nowrap;cursor:pointer}
.fbanner-track{display:inline-block;padding:9px 0;animation:fmarq 34s linear infinite;will-change:transform}
.fbanner:hover .fbanner-track{animation-play-state:paused}
.fbanner-logo{height:15px;width:auto;vertical-align:middle;margin:0 6px 0 26px;position:relative;top:-1px}
.fbanner-track span{color:#CADCFC;font-size:12.5px;font-weight:600;letter-spacing:.02em;padding:0 26px;position:relative}
.fbanner-track span::after{content:"\xB7";position:absolute;right:-3px;color:#17B6A7}
@keyframes fmarq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
