roPips?","A funded-trader firm. Show your skill in a clear evaluation, and when you pass you trade a funded account and keep the majority of the profit, up to a 90% split."],["Which challenge should I choose?","HydroBeast is our flagship: instant-funded, strictest rules, best terms. 2-Step is the most popular and balanced. 1-Step is faster and the only path with Pay-Later. 3-Step has the lowest entry price."],["How does Pay-Later work?","On 1-Step you split the fee: 50% up front and 50% once you pass. Available on 1-Step only."],["Can I open more than one account?","No. One verified identity and one email per user, one account per household or IP, and one funded HydroBeast account per verified user. Multiple accounts or shared identities may void your accounts and payouts."]]],["Rules & account breaches",[["What can cause an account to be breached or closed?","Six things: (1) breaching the maximum daily loss; (2) breaching the maximum overall loss (drawdown); (3) 30 consecutive days with no trading activity; (4) prohibited automation or trading \u2014 EAs/bots, prohibited arbitrage, news trading on a funded account, unauthorized copy-trading, group hedging, or strategies that exploit the simulated environment; (5) identity or account-limit violations \u2014 sharing a verified identity, operating multiple accounts, or coordinating trading across accounts; (6) chargeback abuse. A breach ends the account: on a challenge you fail and may re-attempt; on a funded account it is closed and unrealized or ineligible profit is forfeited, but any payout already approved is still honored."],["How does the maximum daily loss work?","It is measured on your closed-trade balance from the balance you started the day with at 00:00 UTC; open positions do not count. Example: on a $100,000 account with a 5% daily limit, your closed-trade balance may not fall more than $5,000 below that day's starting balance. It resets every day at 00:00 UTC (server turnover)."],["How does the maximum ov :root{--navy:#0A1626;--navy2:#0E2038;--navy3:#12294D;--panel:#0F2440;--cyan:#1CA9E3;--teal:#17B6A7;--ice:#CADCFC;--ink:#E8F0FB;--mut:#93A6C0;--mut2:#6C82A0;--line:rgba(120,160,210,.16);--grad:linear-gradient(120deg,#1CA9E3,#17B6A7);--heading:#fff;--soft:rgba(255,255,255,.03);--soft2:rgba(255,255,255,.07);--header-bg:rgba(10,22,38,.82);--shadow:rgba(0,0,0,.35);}
:root[data-theme=light]{--navy:#F4F8FC;--navy2:#fff;--navy3:#E9F1FA;--panel:#fff;--ink:#22324A;--mut:#54637A;--mut2:#7E8DA3;--line:rgba(20,45,80,.13);--ice:#12294D;--heading:#0C1B30;--soft:rgba(20,60,110,.045);--soft2:rgba(20,60,110,.08);--header-bg:rgba(255,255,255,.86);--shadow:rgba(30,50,90,.13);}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--navy);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .4s}
:root[data-theme=light] body{background:linear-gradient(180deg,#F4F8FC,#EAF1F9)}
h1,h2,h3,h4{font-family:'Sora','Inter',sans-serif;letter-spacing:-.02em;line-height:1.12}
a{color:inherit;text-decoration:none;cursor:pointer}
button{font-family:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}
.grad-txt{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:15px;padding:13px 26px;border-radius:12px;cursor:pointer;border:none;transition:.2s;position:relative;overflow:hidden}
.btn-p{background:var(--grad);color:#062033;box-shadow:0 8px 30px rgba(28,169,227,.32)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(28,169,227,.45)}
.btn-p::after{content:"";position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);transform:skewX(-20deg);transition:left .6s}
.btn-p:hover::after{left:130%}
.btn-g{background:var(--soft2);color:var(--ink);border:1px solid var(--line)}
.btn-g:hover{border-color:var(--cyan);transform:translateY(-2px)}
