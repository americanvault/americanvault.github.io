sal rules (all challenges):")," no news trading on funded accounts; weekend trading permitted on crypto; EAs and bots not permitted; copy-trading limited to your own accounts; arbitrage of any kind prohibited. Monitored automatically. Full breach rules are defined in the FAQ."),bS.map((e,t)=>l.default.createElement(ze,{key:t,className:"rule-block",delay:t%3*60},l.default.createElement("h3",null,l.default.createElement("span",{className:"rn"},t+1),e[0]),l.default.createElement("p",null,e[1]))))))}var SS=[["Getting started",[["What is HydroPips?","A funded-trader firm. Show your skill in a clear evaluation, and when you pass you trade a funded account and keep the majority of the profit, up to a 90% split."],["Which challenge should I choose?","HydroBeast is our flagship: instant-funded, strictest rules, best terms. Current is the most popular and balanced. Rapids is faster and the only path with Pay-Later. Estuary has the lowest entry price."],["How does Pay-Later work?","On Rapids you split the fee: 50% up front and 50% once you pass. Available on Rapids only."],["Can I have more than one trading account?","Yes. You can hold more than one trading account, challenge and funded, under a single HydroPips registration. What you cannot do is register more than once: one verified identity and one email per person. HydroBeast funded accounts are the one exception, limited to one per verified user. More than one registration sharing a household or IP triggers a review, not an automatic void: genuine separate traders in the same home or office are welcome after verification. Prohibited is one person creating multiple registrations, sharing a verified identity, or coordinating trades across accounts to game the rules."]]],["Rules & account breaches",[["What can cause an account to be breached or closed?","Six things: (1) breaching the maximum daily loss; (2) breaching the maximum overall loss (drawdown); (3) 30 consecutive days with no trading activity; (4) prohibited automation or trading \u2014 EAs/bots, prohibited arbitrage, news trading on a funded account, unauthorized copy-trading, group hedging, or strategies that exploit the simulated environment; (5) identity violations \u2014 sharing a verified identity, registering more than once, or coordinating trading across accounts to game the rules; (6) chargeback abuse. A breach ends the account: on a challenge you fail and may re-attempt; on a funded account it is closed and unrealized or ineligible profit is forfeited, but any payout already approved is still honored."],["How does the maximum daily loss work?","It is measured on your closed-trade balance from the balance you started the day with at 00:00 UTC; open positions do not count. Example: on a $100,000 account with a 5% daily limit, your closed-trade balance may not fall more than $5,000 below that day's starting balance. It resets every day at 00:00 UTC (server turnover)."],["How does the maximum overall loss (drawdown) work?","It is a balance-based floor measured on closed trades. On HydroBeast and Rapids the floor trails your highest closed balance upward and locks once you are in profit; on Current and Estuary it is static from your starting balance. Reaching or passing the floor breaches the account."],["What happens if my account is inactive?","Any account \u2014 challenge or funded \u2014 with no trading activity for 30 consecutive days is permanently breached and closed. This applies to every account."],["What are the automation, copy-trading and arbitrage rules?","Expert Advisors and trading bots are not permitted. You may copy trades between your own HydroPips accounts, but mirroring another person's account or a third-party signal service on a funded account is not allowed. Arbitrage \u2014 including latency, feed, and cross-account or cross-broker hedge arbitrage \u2014 and any strategy that profits from simulated pricing or execution rather than real market movement (off-market fills, un-fillable gaps, feed latency) is prohibited."],["What are the news-trading rules?","On funded accounts you may not open or close a position within 5 minutes before or after a high-impact (red-folder) release on the HydroPips economic calendar, for the instruments directly affected by that release. Overnight and weekend holding is allowed; weekend trading is permitted on crypto."],["How do the identity and registration limits work?","One HydroPips registration per person: one verified identity and one email. You can hold multiple trading accounts under it, with HydroBeast funded accounts capped at one per verified user. Identity verification (KYC) is handled by Rise and runs only when you become funded \u2014 on an instant-funded purchase or after passing an evaluation \u2014 for every funded trader alike. More than one registration sharing a household or IP triggers a review, not an automatic void \u2014 genuine separate traders in the same home or office are welcome after verification. What is prohibited is one person creating multiple registrations, sharing a verified identity, coordinating (group-hedging) trades across accounts, or using a VPN to misrepresent your location."]]],["Getting paid & verified",[["How do I get paid?","Payouts are processed globally through Rise (riseworks.io), in fiat or crypto."],["What is the profit split?","Up to 90%, starting at 80% and rising with account size and TRADEGRADE\u2122."],["How often are payouts, and can I get them faster?","During the founding launch, every account pays out on a 30-day cycle. After our first 2,500 members, you pick your cycle at checkout: the standard 14 days, a 30-day cycle for a lower fee, or every 7 days as an optional add-on (also redeemable with HydroPoints). Whatever you choose, every approved payout is processed on the same standard timeline."],["Do you offer refunds?","Fees are non-refundable, except where required by law or where HydroPips fails to provide the purchased product, for example a duplicate charge or an undelivered product. If something is wrong, contact support first and we will make it right. Fraudulent, abusive, or bad-faith chargebacks may result in account closure and permanent ineligibility, and nothing here limits any non-waivable consumer right under applicable law."],["When do I complete identity verification (KYC)?","There is no identity check to sign up or to buy an evaluation. KYC is handled by Rise and runs only when you become funded \u2014 automatically on an instant-funded (HydroBeast) purchase, or once you pass an evaluation. It is the same step for every funded trader, disclosed up front, and you complete it once."]]],["HydroPoints & rewards",[["What are HydroPoints?","HydroPoints (HP) are the currency of HydroPower, the Osirin loyalty program. You earn HP on purchases at TDC Academy and HydroPips and on verified funded-account milestones, and you redeem them only for HydroPips prop-firm products."],["How do I earn HydroPoints?","One HP per $1 on one-time purchases (challenges, add-ons, one-off TDC products) and 2 HP per $1 on subscription renewals. Founding Members earn 3x on their first purchase and 2x for life. You also earn milestone HP on funded activity: 300 for your first payout, 100 for each additional payout, 75 for every 10 banked trading days, 50 for passing a challenge phase, and 250 for a referral who completes a purchase. Points post only on completed, non-refunded transactions and server-verified account events."],["What can I redeem HydroPoints for?","HydroPoints redeem only for HydroPips products \u2014 never cash, and never TDC products. The catalog includes discounts (25% off from 200 HP, 50% off from 400 HP), a free full reset (600 HP), the optional 7-day first-payout add-on (300 HP), a +5% split on your next payout (600 HP), free Estuary challenges (450 HP for 5K up to 1,300 HP for 50K), and HydroBeast Pro instant-funded accounts (750 HP for 5K up to 1,600 HP for 50K, Pro variant only). Every redemption is a request that is reviewed within 48 hours before it is provisioned; your points are held while it is pending and released back if it is denied. Discount and modifier rewards are issued as a code unique to you that expires 7 days after approval."],["Do HydroPoints expire?","Yes. HydroPoints expire 12 months after they are earned, oldest first. We notify you about 30 days before a batch is due to expire so you have time to redeem."],["What happens to my points on a refund or chargeback?","Points earned on a purchase that is later refunded or charged back are reversed. A chargeback also forfeits any remaining balance. Points already spent on a redeemed reward are not returned."],["Do HydroPoints have cash value?","No. HydroPoints have no cash value, cannot be exchanged for cash, and are non-transferable \u2014 they cannot be sold, gifted, or combined across accounts. They are a loyalty perk, not a financial asset. A redeemed challenge or funded account is still a simulated evaluation subject to every HydroPips rule; passing and payout are never guaranteed."]]],["Platforms & trading",[["Which platforms can I trade on?","TradeLocker, cTrader, and DXtrade \u2014 all on equal footing, with TradingView charting across them."],["What leverage do I get?","Forex up to 1:50 on HydroBeast and Rapids, and up to 1:100 on Current and Estuary. Indices and metals up to 1:20, and crypto up to 1:2 on every account."],["When does the daily loss limit reset?","At 00:00 UTC each day (server turnover)."],["Can I trade from the United States?","Yes. HydroPips welcomes traders worldwide, including the US."]]]];function _S({q:e,a:t,open:n}){let[a,i]=(0,l.useState)(!!n);return l.default.createElement("div",{className:"acc"+(a?" open":"")},l.default.createElement("button",{className:"accq",onClick:()=>i(!a)},e,l.default.createElement("span",{className:"accx"},"+")),a&&l.default.createElement("div",{className:"acca"},t))}function ES(){return l.default.createElement("section",{className:"pageview"},l.default.createEle "],["Payouts","Payouts run on a fixed 14-day cycle (30 days during launch), with an optional 7-day add-on available by purchase or HydroPoints redemption. Every approved payout is processed on the same standard timeline. Payouts require identity verification (KYC) through our provider and good standing under the Trading Rules."],["Prohibited conduct","You may not register more than once or trade under more than one identity, share a verified identity, coordinate trading across accounts to game the rules, use prohibited automation, or exploit simulated pricing or execution. Holding multiple trading accounts under your single registration is allowed. Breaching the Trading Rules may end the account and forfeit ineligible profit, as those rules describe."],["Intellectual property","The HydroPips, TRADEGRADE, RISKGRADE, HydroPower, and HydroPoints names and marks, and all related software and content, are owned by Osirin Management Holdings and used by HydroPips under license. Using the service grants you no ownership rights in them."],["Disclaimers and liability","The service is provided on an as-is basis. To the fullest extent permitted by law, HydroPips is not liable for indirect or consequential losses. Nothing here excludes liability that cannot be excluded by law."],["Governing law and disputes","These Terms are governed by the laws of the State of Delaware, United States, and you and HydroPips LLC submit to the state and federal courts located in Delaware for any dispute, without limiting any non-waivable consumer right or protection available to you in your own country of residence."],["Changes and contact","We may update these Terms; material changes are posted here with a revised date. Questions go to support through the Contact page."]]},privacy:{title:"Privacy Policy",intro:"This Policy explains what we collect, why, and the choices you have. HydroPips shares a single identity and rewards layer (Osirin Core) with TDC Academy so one account works across both.",body:[["Information we collect","Account details such as name and email, the profile and address information you enter, KYC data collected by our verification provider when you become funded, transaction and payout records, and the trading-account activity used to grade and administer your account."],["How we use it","To provide evaluations and funded accounts, process payments and payouts, run identity verification, operate the HydroPower rewards program, prevent fraud and rule abuse, and meet our legal obligations."],["Service providers","We use third parties for payments, identity verification, and payouts (for example Confirmo, TazaPay, and Rise). They process your data only to provide their service to us."],["The Osirin ecosystem","Your Osirin ID, profile, and HydroPoints balance are shared across HydroPips and TDC Academy so the same account works on both. Trading data stays with the entity that holds the account."],["Retention and security","We keep records for as long as the service and the law require, and protect them with access controls and encryption in transit. All point and money changes are written server-side; you can read only your own records."],["Your rights","Depending on where you live, you may request access to, correction of, or deletion of your data, subject to records we are required to keep. Contact us to make a request."],["Cookies and selling","The portal uses only the storage needed to keep you signed in and operate the site. We do not sell your personal information."]]},risk:{title:"Risk Disclosure",intro:"Trading leveraged products is high risk. Please read this before you purchase.",body:[["Simulated trading","HydroPips evaluations and funded accounts are simulated. You are demonstrating skill in a simulated environment, not trading real money, and results in the simulation do not represent real-market outcomes."],["No guarantee of profit or funding","Passing an evaluation, staying funded, and receiving a payout are never guaranteed c account. It applies to every eligible funded account you hold now or open in the future under that registration."],["Lifetime 90% split","Verified Founding Members begin every eligible funded account at a 90% profit split for life, in place of the standard entry split. This overrides the standard schedule, under which non-founding accounts start at 80% and rise with TRADEGRADE. TRADEGRADE still governs scaling and other terms; it simply cannot place a Founding Member below the 90% floor."],["Locked-in founding pricing","For as long as your founding status is active, you pay the founding launch price for each challenge type and account size, even after standard prices rise. Locked pricing covers the base evaluation and instant-funded fees only; it does not cover optional add-ons, taxes, or third-party costs."],["HydroPoints","Founding Members earn 3x HydroPoints on their first qualifying purchase and 2x HydroPoints for life on eligible purchases, above the standard rate. Standard HydroPoints terms \u2014 12-month expiry, clawback on refund or chargeback, no cash value \u2014 still apply."],["Founding affiliate rate","A Founding Member who runs an affiliate account earns a 15% commission rate on qualifying referred purchases. This is the total founding commission rate, not an addition on top of another rate."],["Refunds and chargebacks","Founding status depends on a completed, non-refunded qualifying purchase. If that purchase is refunded or charged back, founding status and its benefits are revoked and the place may be released to the next member."],["Breaches and inactivity","A single account breach, or an inactivity closure of one account, ends that account only. It does not remove your founding status, which stays with your registration and applies to future eligible accounts. Founding status is revoked only on chargeback, ban, fraud, or serious abuse."],["Changes","Osirin may adjust the program prospectively with notice, but a lifetime benefit already granted t :root{--navy:#0A1626;--navy2:#0E2038;--navy3:#12294D;--panel:#0F2440;--cyan:#1CA9E3;--teal:#17B6A7;--ice:#CADCFC;--ink:#E8F0FB;--mut:#93A6C0;--mut2:#6C82A0;--line:rgba(120,160,210,.16);--grad:linear-gradient(120deg,#1CA9E3,#17B6A7);--heading:#fff;--soft:rgba(255,255,255,.03);--soft2:rgba(255,255,255,.07);--header-bg:rgba(10,22,38,.82);--shadow:rgba(0,0,0,.35);}
:root[data-theme=light]{--navy:#F4F8FC;--navy2:#fff;--navy3:#E9F1FA;--panel:#fff;--ink:#22324A;--mut:#54637A;--mut2:#7E8DA3;--line:rgba(20,45,80,.13);--ice:#12294D;--heading:#0C1B30;--soft:rgba(20,60,110,.045);--soft2:rgba(20,60,110,.08);--header-bg:rgba(255,255,255,.86);--shadow:rgba(30,50,90,.13);}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--navy);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .4s}
:root[data-theme=light] body{background:linear-gradient(180deg,#F4F8FC,#EAF1F9)}
h1,h2,h3,h4{font-family:'Sora','Inter',sans-serif;letter-spacing:-.02em;line-height:1.12}
a{color:inherit;text-decoration:none;cursor:pointer}
button{font-family:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}
.grad-txt{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:15px;padding:13px 26px;border-radius:12px;cursor:pointer;border:none;transition:.2s;position:relative;overflow:hidden}
.btn-p{background:var(--grad);color:#062033;box-shadow:0 8px 30px rgba(28,169,227,.32)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(28,169,227,.45)}
.btn-p::after{content:"";position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);transform:skewX(-20deg);transition:left .6s}
.btn-p:hover::after{left:130%}
.btn-g{background:var(--soft2);color:var(--ink);border:1px solid var(--line)}
.btn-g:hover{border-color:var(--cyan);transform:translateY(-2px)}
.eyebrow{font-size:12.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan)}
.sec-pad{padding:92px 0;position:relative}
.rv{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}
.rv.in{opacity:1;transform:none}
.viewfade{animation:vfade .5s ease}
@keyframes vfade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
header{position:sticky;top:0;z-index:50;background:rgba(10,22,38,.92)!important;backdrop-filter:blur(14px);border-bottom:1px solid rgba(120,160,210,.18)}
nav{display:flex;align-items:center;justify-content:space-between;height:70px}
nav .logo img{height:30px;display:block}
nav ul{display:flex;gap:30px;list-style:none}
nav ul a{font-size:14.5px;font-weight:500;color:#9fb0c8;transition:.15s}
nav ul a:hover,nav ul a.on{color:#fff}
.nav-cta{display:flex;gap:12px;align-items:center}
.theme-btn{background:rgba(255,255,255,.08);border:1px solid rgba(159,176,200,.3);color:#E8F0FB;width:40px;height:40px;border-radius:10px;cursor:pointer;font-size:17px}
.theme-btn:hover{background:rgba(255,255,255,.15);border-color:var(--cyan)}
.menu-btn{display:none;background:none;border:none;color:#E8F0FB;font-size:26px;cursor:pointer}
@media(max-width:900px){nav ul{display:none;position:absolute;top:70px;left:0;right:0;flex-direction:column;background:var(--navy2);padding:18px 24px;border-bottom:1px solid var(--line);gap:16px}nav ul.open{display:flex}nav ul a{color:var(--ink)}.menu-btn{display:block}}
.hero{position:relative;padding:104px 0 92px;overflow:hidden}
.hero-mesh{position:absolute;inset:0;background:radial-gradient(700px 460px at 80% 0%,rgba(28,169,227,.22),transparent 60%),radial-gradient(620px 460px at 10% 100%,rgba(23,182,167,.2),transparent 60%),radial-gradient(500px 400px at 60% 60%,rgba(28,169,227,.1),transparent 60%);background-size:200% 200%;animation:mesh 16s ease-in-out infinite;pointer-events:none}
@keyframes mesh{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:54px 54px;-webkit-mask-image:radial-gradient(circle at 50% 30%,#000,transparent 72%);mask-image:radial-gradient(circle at 50% 30%,#000,transparent 72%);opacity:.5}
.hero-wrap{position:relative}
.hero-inner{max-width:640px}
.pill{display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--ice);background:rgba(28,169,227,.1);border:1px solid rgba(28,169,227,.32);padding:7px 15px;border-radius:100px;margin-bottom:26px}
.pill .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 4px rgba(23,182,167,.22);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(23,182,167,.22)}50%{box-shadow:0 0 0 7px rgba(23,182,167,0)}}
.hero h1{font-size:clamp(40px,6vw,64px);font-weight:800;margin-bottom:22px}
.hero p.lead{font-size:clamp(17px,2.2vw,20px);color:var(--mut);margin-bottom:32px}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap}
.hero-note{margin-top:20px;font-size:13.5px;color:var(--mut2);display:flex;gap:22px;flex-wrap:wrap}
.hero-note span{display:flex;align-items:center;gap:7px}.chk{color:var(--teal);font-weight:800}
.anim1,.anim2,.anim3,.anim4,.anim5,.anim6{opacity:0;animation:up .7s cubic-bezier(.2,.7,.2,1) forwards}
.anim2{animation-delay:.08s}.anim3{animation-delay:.16s}.anim4{animation-delay:.26s}.anim5{animation-delay:.36s}.anim6{animation-delay:.46s}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.hero-visual{position:absolute;top:70px;right:0;width:360px;opacity:0;animation:up .8s .3s cubic-bezier(.2,.7,.2,1) forwards}
.hv-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:24px;box-shadow:0 30px 70px var(--shadow);transform:rotate(2deg);animation:floaty 6s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:rotate(2deg) translateY(0)}50%{transform:rotate(2deg) translateY(-12px)}}
.hv-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hv-lbl{font-size:12px;color:var(--mut2);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.hv-grade{font-size:11px;font-weight:800;color:var(--teal);background:rgba(23,182,167,.14);padding:4px 9px;border-radius:7px}
.hv-bal{font-family:'Sora';font-size:34px;font-weight:800;color:var(--heading)}
.hv-pl{color:var(--teal);font-weight:700;font-size:15px;margin-bottom:10px}.hv-pl span{color:var(--mut2);font-weight:500}
.hv-spark{width:100%;height:58px;display:block;margin-bottom:12px}
.hv-row{display:flex;justify-content:space-between;font-size:13px;color:var(--mut);padding:8px 0;border-top:1px dashed var(--line)}.hv-row b{color:var(--heading)}
.hv-chip{position:absolute;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 14px;font-size:12.5px;font-weight:700;box-shadow:0 12px 30px var(--shadow);animation:floaty2 5s ease-in-out infinite}
.hv-chip.c1{top:-6px;left:-40px;color:var(--teal)}
.hv-chip.c2{bottom:16px;left:-30px;color:var(--cyan);animation-delay:1s}
@keyframes floaty2{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@media(max-width:1000px){.hero-visual{display:none}.hero-inner{max-width:100%}}
.sh{max-width:680px;margin-bottom:50px}
.sh h2{font-size:clamp(29px,4vw,42px);font-weight:800;margin:14px 0 16px}.sh p{font-size:17px;color:var(--mut)}
.sh.center{margin-left:auto;margin-right:auto;text-align:center}
.cfg{max-width:1000px;margin:0 auto}
.cstep{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin:18px 0 10px}.cstep:first-child{margin-top:0}
.t-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.s-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.p-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.opt{position:relative;border:1px solid var(--line);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:.18s;background:var(--soft);font-size:14px;font-weight:700;color:var(--ink)}
.opt small{display:block;font-weight:500;color:var(--mut2);font-size:11px;margin-top:3px}
.opt.sel{border-color:var(--cyan);background:rgba(28,169,227,.1);box-shadow:0 0 0 1px var(--cyan);transform:translateY(-2px)}
.opt:hover{border-color:rgba(28,169,227,.45);transform:translateY(-2px)}
.opt.proopt{border-color:rgba(23,182,167,.5)}.opt.proopt.sel{box-shadow:0 0 0 1px var(--teal)}
.probadge{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:linear-gradient(120deg,#17B6A7,#1CA9E3);color:#062033;font-size:9px;font-weight:800;letter-spacing:.08em;padding:2px 8px;border-radius:100px}
.reveal{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:24px;background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 8px 26px var(--shadow)}
.rev-col{padding:22px 24px}.rev-col.funded{border-left:1px solid var(--line)}
.rev-col .rh{display:flex;align-items:center;gap:10px;margin-bottom:6px}.rev-col .dotc{width:9px;height:9px;border-radius:50%}.rev-col.eval .dotc{background:var(--cyan)}.rev-col.funded .dotc{background:var(--teal)}
.rev-col h4{font-size:16px;font-weight:700}.rev-col .rsub{font-size:12.5px;color:var(--mut2);margin-bottom:12px}
.rrow{display:flex;justify-content:space-between;gap:14px;border-bottom:1px dashed var(--line);padding:11px 0;font-size:14px;color:var(--mut)}.rrow:last-child{border-bottom:none}.rrow b{color:var(--heading);font-weight:600;text-align:right}.rrow.hi b{color:var(--teal)}
.priceband{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;background:linear-gradient(120deg,var(--navy3),var(--navy2));border:1px solid rgba(28,169,227,.3);border-radius:16px;padding:20px 24px;margin-top:20px}
.priceband .k{font-size:12px;color:var(--mut2)}.priceband .v{font-family:'Sora';font-size:30px;font-weight:800;color:var(--heading);line-height:1.1}.priceband .v small{font-size:13px;font-weight:500;color:var(--mut)}
.pop{display:inline-block;animation:pop .35s ease}@keyframes pop{0%{transform:scale(.8);opacity:.3}100%{transform:scale(1);opacity:1}}
.priceband .paylater{font-size:12px;color:var(--teal);font-weight:600;margin-top:3px}
@media(max-width:820px){.t-row,.p-row{grid-template-columns:repeat(2,1fr)}.s-row{grid-template-columns:repeat(3,1fr)}.reveal{grid-template-columns:1fr}.rev-col.funded{border-left:none;border-top:1px solid var(--line)}}
