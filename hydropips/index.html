ttempt; on a funded account it is closed and unrealized or ineligible profit is forfeited, but any payout already approved is still honored."],["How does the maximum daily loss work?","It is measured on your closed-trade balance from the balance you started the day with at 00:00 UTC; open positions do not count. Example: on a $100,000 account with a 5% daily limit, your closed-trade balance may not fall more than $5,000 below that day's starting balance. It resets every day at 00:00 UTC (server turnover)."],["How does the maximum overall loss (drawdown) work?","It is a balance-based floor measured on closed trades. On HydroBeast and Rapids the floor trails your highest closed balance upward and locks once you are in profit; on Current and Estuary it is static from your starting balance. Reaching or passing the floor breaches the account."],["What happens if my account is inactive?","Any account \u2014 challenge or funded \u2014 with no trading activity for 30 consecutive days is permanently breached and closed. This applies to every account."],["What are the automation, copy-trading and arbitrage rules?","Expert Advisors and trading bots are not permitted. You may copy trades between your own HydroPips accounts, but mirroring another person's account or a third-party signal service on a funded account is not allowed. Arbitrage \u2014 including latency, feed, and cross-account or cross-broker hedge arbitrage \u2014 and any strategy that profits from simulated pricing or execution rather than real market movement (off-market fills, un-fillable gaps, feed latency) is prohibited."],["What are the news-trading rules?","On funded accounts you may not open or close a position within 5 minutes before or after a high-impact (red-folder) release on the HydroPips economic calendar, for the instruments directly affected by that release. Overnight and weekend holding is allowed; weekend trading is permitted on crypto."],["How do the identity and registration limits work?","One HydroPips registration per person: one verified identity and one email. You can hold multiple trading accounts under it, with HydroBeast funded accounts capped at one per verified user. Identity verification (KYC) is handled by Rise and runs only when you become funded \u2014 on an instant-funded purchase or after passing an evaluation \u2014 for every funded trader alike. More than one registration sharing a household or IP triggers a review, not an automatic void \u2014 genuine separate traders in the same home or office are welcome after verification. What is prohibited is one person creating multiple registrations, sharing a verified identity, coordinating (group-hedging) trades across accounts, or using a VPN to misrepresent your location."]]],["Getting paid & verified",[["How do I get paid?","Payouts are processed globally through Rise (riseworks.io), in fiat or crypto."],["What is the profit split?","Up to 90%, starting at 80% and rising with account size and TRADEGRADE\u2122."],["How often are payouts, and can I get them faster?","During the founding launch, every account pays out on a 30-day cycle. After our first 2,500 members, you pick your cycle at checkout: the standard 14 days, a 30-day cycle for a lower fee, or every 7 days as an optional add-on (also redeemable with HydroPoints). Whatever you choose, every approved payout is processed on the same standard timeline."],["Do you offer refunds?","Fees are non-refundable, except where required by law or where HydroPips fails to provide the purchased product, for example a duplicate charge or an undelivered product. If something is wrong, contact support first and we will make it right. Fraudulent, abusive, or bad-faith chargebacks may result in account closure and permanent ineligibility, and nothing here limits any non-waivable consumer right under applicable law."],["When do I complete identity verification (KYC)?","There is no identity check to sign up or to buy an evaluation. KYC is handled by Rise and runs only when you become funded \u2014 automatically on an instant-funded (HydroBeast) purchase, or once you pass an evaluation. It is the same step for every funded trader, disclosed up front, and you complete it once."]]],["HydroPoints & rewards",[["What are HydroPoints?","HydroPoints (HP) are the currency of HydroPower, the Osirin loyalty program. You earn HP on purchases at TDC Academy and HydroPips and on verified funded-account milestones, and you redeem them only for HydroPips prop-firm products."],["How do I earn HydroPoints?","One HP per $1 on one-time purchases (challenges, add-ons, one-off TDC products) and 2 HP per $1 on subscription renewals. Founding Members earn 2x HydroPoints for life. You also earn milestone HP on funded activity: 300 for your first payout, 100 for each additional payout, 75 for every 10 banked trading days, 50 for passing a challenge phase, and 250 for a referral who completes a purchase. Points post only on completed, non-refunded transactions and server-verified account events."],["What can I redeem HydroPoints for?","HydroPoints redeem only for HydroPips products \u2014 never cash, and never TDC products. The catalog includes discounts (20% off from 200 HP, 30% off from 400 HP, non-stacking), a free full reset (600 HP), the optional 7-day first-payout add-on (300 HP), a +5% split on your next payout (600 HP), free Estuary challenges (450 HP for 5K up to 1,300 HP for 50K), and HydroBeast Pro instant-funded accounts (750 HP for 5K up to 1,600 HP for 50K, Pro variant only). Every redemption is a request that is reviewed within 48 hours before it is provisioned; your points are held while it is pending and released back if it is denied. Discount and modifier rewards are issued as a code unique to you that expires 7 days after approval."],["Do HydroPoints expire?","Yes. HydroPoints expire 12 months after they are earned, oldest first. We notify you about 30 days before a batch is due to expire so you have time to redeem."],["What happens to my points on a refund or chargeback?","Points earned on a purchase that is later refunded or charged back are reversed. A chargeback also forfeits any remaining balance. Points already spent on a redeemed reward are not returned."],["Do HydroPoints have cash value?","No. HydroPoints have no cash value, cannot be exchanged for cash, and are non-transferable \u2014 they cannot be sold, gifted, or combined across accounts. They are a loyalty perk, not a financial asset. A redeemed challenge or funded account is still a simulated evaluation subject to every HydroPips rule; passing and payout are never guaranteed."]]],["Platforms & trading",[["Which platforms can I trade on?","TradeLocker, cTrader, and DXtrade \u2014 all on equal footing, with TradingView charting across them."],["What leverage do I get?","Forex up to 1:50 on HydroBeast and Rapids, and up to 1:100 on Current and Estuary. Indices and metals up to 1:20, and crypto up to 1:2 on every account."],["When does the daily loss limit reset?","At 00:00 UTC each day (server turnover)."],["Can I trade from the United States?","Yes. HydroPips welcomes traders worldwide, including the US."]]]];function Gx({q:e,a:t,open:n}){let[a,i]=(0,o.useState)(!!n);return o.default.createElement("div",{className:"acc"+(a?" open":"")},o.default.createElement("button",{className:"accq",onClick:()=>i(!a)},e,o.default.createElement("span",{className:"accx"},"+")),a&&o.default.createElement("div",{className:"acca"},t))}function Rx(){return o.default.createElement("section",{className:"pageview"},o.default.createElement("div",{className:"phead"},o.default.createElement("div",{className:"wrap"},o.default.createElement("span",{className:"eyebrow"},"FAQ"),o.default.createElement("h1",null,"Frequently asked questions"),o.default.createElement("p",null,"How the challenges work, how you get paid, and what you can trade."))),o.default.createElement("div",{className:"wrap sec-pad"},qx.map((e,t)=>o.default.createElement("div",{key:t,clas may be sent to support@hydropips.com, and its registered address is available on request."],["Payouts","Payouts run on a fixed 14-day cycle (30 days during launch), with an optional 7-day add-on available by purchase or HydroPoints redemption. Every approved payout is processed on the same standard timeline. Payouts require identity verification (KYC) through our provider and good standing under the Trading Rules."],["Prohibited conduct","You may not register more than once or trade under more than one identity, share a verified identity, coordinate trading across accounts to game the rules, use prohibited automation, or exploit simulated pricing or execution. Holding multiple trading accounts under your single registration is allowed. Breaching the Trading Rules may end the account and forfeit ineligible profit, as those rules describe."],["Intellectual property","The HydroPips, TRADEGRADE, RISKGRADE, HydroPower, and HydroPoints names and marks, and all related software and content, are owned by Osirin Management Holdings and used by HydroPips under license. Using the service grants you no ownership rights in them."],["Disclaimers and liability","The service is provided on an as-is basis. To the fullest extent permitted by law, HydroPips is not liable for indirect or consequential losses. Nothing here excludes liability that cannot be excluded by law."],["Governing law and disputes","These Terms are governed by the laws of the State of Delaware, United States, and you and HydroPips LLC submit to the state and federal courts located in Delaware for any dispute, without limiting any non-waivable consumer right or protection available to you in your own country of residence."],["Changes and contact","We may update these Terms; material changes are posted here with a revised date. Questions go to support through the Contact page."]]},privacy:{title:"Privacy Policy",intro:"This Policy explains what we collect, why, and the choices you have. HydroPips shares a single identity and rewards layer (Osirin Core) with TDC Academy so one account works across both.",body:[["Information we collect","Account details such as name and email, the profile and address information you enter, KYC data collected by our verification provider when you become funded, transaction and payout records, and the trading-account activity used to grade and administer your account."],["How we use it","To provide evaluations and funded accounts, process payments and payouts, run identity verification, operate the HydroPower rewards program, prevent fraud and rule abuse, and meet our legal obligations."],["Service providers","We use third parties for payments, identity verification, and payouts (for example Confirmo, TazaPay, and Rise). They process your data only to provide their service to us."],["The Osirin ecosystem","Your Osirin ID, profile, and HydroPoints balance are shared across HydroPips and TDC Academy so the same account works on both. Trading data stays with the entity that holds the account."],["Retention and security","We keep records for as long as the service and the law require, and protect them with access controls and encryption in transit. All point and money changes are written server-side; you can read only your own records."],["Your rights","Depending on where you live, you may request access to, correction of, or deletion of your data, subject to records we are required to keep. Contact us to make a request."],["Cookies and selling","The portal uses only the storage needed to keep you signed in and operate the site. We do not sell your personal information."]]},risk:{title:"Risk Disclosure",intro:"Trading leveraged products is high risk. Please read this before you purchase.",body:[["Simulated trading","HydroPips evaluations and funded accounts are simulated. You are demonstrating skill in a simulated environment, not trading real money, and results in the simulation do not represent real-market outcomes."],["No guarantee of profit or funding","Passing an evaluation, staying funded, and receiving a payout are never guaranteed. Most participants do not pass, and past performance does not indicate future results."],["Fees at risk","Evaluation and instant-funded fees are non-refundable except as described in the Terms. Only commit a fee you can afford to lose."],["Not investment advice","Nothing on this site is investment advice, a solicitation, or an offer of employment or a trading position at any Osirin company. Any decision to take part is your own."],["Leverage","Simulated leverage can amplify simulated gains and losses quickly. The Trading Rules define the limits that apply to each account."]]},contact:{title:"Contact",intro:"We are here to help. The fastest way to resolve an order or access problem is to reach support before opening a payment dispute.",body:[["Support","Email support@hydropips.com with your account email and order reference. We aim to respond within one business day."],["Payments and payouts","For a billing question, a duplicate charge, or a payout query, contact support with the transaction details and we will investigate."],["Company","HydroPips LLC is a Delaware limited liability company, operating the HydroPips brand under license from Osirin Management Holdings. Its registered address is available on request. Legal notices may be sent to the support address above."]]},founding:{title:"Founding Member Terms",intro:"The Founding 2,500 program rewards our earliest paying members with lifetime benefits. Because these benefits are lifetime, these terms define exactly what founding status is, who earns it, and how each benefit works.",body:[["Who qualifies","Founding status is granted to the first 2,500 verified members to complete a qualifying paid purchase \u2014 a challenge or an instant-funded account. Free sign-ups do not count; a place is earned by a completed, non-refunded purchase, in the order those purchases clear."],["It attaches to you, not one account","Founding stat :root{--navy:#0A1626;--navy2:#0E2038;--navy3:#12294D;--panel:#0F2440;--cyan:#1CA9E3;--teal:#17B6A7;--ice:#CADCFC;--ink:#E8F0FB;--mut:#93A6C0;--mut2:#6C82A0;--line:rgba(120,160,210,.16);--grad:linear-gradient(120deg,#1CA9E3,#17B6A7);--heading:#fff;--soft:rgba(255,255,255,.03);--soft2:rgba(255,255,255,.07);--header-bg:rgba(10,22,38,.82);--shadow:rgba(0,0,0,.35);}
:root[data-theme=light]{--navy:#F4F8FC;--navy2:#fff;--navy3:#E9F1FA;--panel:#fff;--ink:#22324A;--mut:#54637A;--mut2:#7E8DA3;--line:rgba(20,45,80,.13);--ice:#12294D;--heading:#0C1B30;--soft:rgba(20,60,110,.045);--soft2:rgba(20,60,110,.08);--header-bg:rgba(255,255,255,.86);--shadow:rgba(30,50,90,.13);}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--navy);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .4s}
:root[data-theme=light] body{background:linear-gradient(180deg,#F4F8FC,#EAF1F9)}
h1,h2,h3,h4{font-family:'Sora','Inter',sans-serif;letter-spacing:-.02em;line-height:1.12}
a{color:inherit;text-decoration:none;cursor:pointer}
button{font-family:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}
.grad-txt{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:15px;padding:13px 26px;border-radius:12px;cursor:pointer;border:none;transition:.2s;position:relative;overflow:hidden}
.btn-p{background:var(--grad);color:#062033;box-shadow:0 8px 30px rgba(28,169,227,.32)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(28,169,227,.45)}
.btn-p::after{content:"";position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);transform:skewX(-20deg);transition:left .6s}
.btn-p:hover::after{left:130%}
.btn-g{background:var(--soft2);color:var(--ink);border:1px solid var(--line)}
.btn-g:hover{border-color:var(--cyan);transform:translateY(-2px)}
.eyebrow{font-size:12.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan)}
.sec-pad{padding:92px 0;position:relative}
.rv{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}
.rv.in{opacity:1;transform:none}
.viewfade{animation:vfade .5s ease}
@keyframes vfade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
header{position:sticky;top:0;z-index:50;background:rgba(10,22,38,.92)!important;backdrop-filter:blur(14px);border-bottom:1px solid rgba(120,160,210,.18)}
nav{display:flex;align-items:center;justify-content:space-between;height:70px}
nav .logo img{height:30px;display:block}
nav ul{display:flex;gap:30px;list-style:none}
nav ul a{font-size:14.5px;font-weight:500;color:#9fb0c8;transition:.15s}
nav ul a:hover,nav ul a.on{color:#fff}
.nav-cta{display:flex;gap:12px;align-items:center}
.theme-btn{background:rgba(255,255,255,.08);border:1px solid rgba(159,176,200,.3);color:#E8F0FB;width:40px;height:40px;border-radius:10px;cursor:pointer;font-size:17px}
.theme-btn:hover{background:rgba(255,255,255,.15);border-color:var(--cyan)}
.menu-btn{display:none;background:none;border:none;color:#E8F0FB;font-size:26px;cursor:pointer}
@media(max-width:900px){nav ul{display:none;position:absolute;top:70px;left:0;right:0;flex-direction:column;background:var(--navy2);padding:18px 24px;border-bottom:1px solid var(--line);gap:16px}nav ul.open{display:flex}nav ul a{color:var(--ink)}.menu-btn{display:block}}
.hero{position:relative;padding:104px 0 92px;overflow:hidden}
.hero-mesh{position:absolute;inset:0;background:radial-gradient(700px 460px at 80% 0%,rgba(28,169,227,.22),transparent 60%),radial-gradient(620px 460px at 10% 100%,rgba(23,182,167,.2),transparent 60%),radial-gradient(500px 400px at 60% 60%,rgba(28,169,227,.1),transparent 60%);background-size:200% 200%;animation:mesh 16s ease-in-out infinite;pointer-events:none}
@keyframes mesh{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:54px 54px;-webkit-mask-image:radial-gradient(circle at 50% 30%,#000,transparent 72%);mask-image:radial-gradient(circle at 50% 30%,#000,transparent 72%);opacity:.5}
.hero-wrap{position:relative}
.hero-inner{max-width:640px}
.pill{display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--ice);background:rgba(28,169,227,.1);border:1px solid rgba(28,169,227,.32);padding:7px 15px;border-radius:100px;margin-bottom:26px}
.pill .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 4px rgba(23,182,167,.22);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(23,182,167,.22)}50%{box-shadow:0 0 0 7px rgba(23,182,167,0)}}
.hero h1{font-size:clamp(40px,6vw,64px);font-weight:800;margin-bottom:22px}
.hero p.lead{font-size:clamp(17px,2.2vw,20px);color:var(--mut);margin-bottom:32px}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap}
.hero-note{margin-top:20px;font-size:13.5px;color:var(--mut2);display:flex;gap:22px;flex-wrap:wrap}
.hero-note span{display:flex;align-items:center;gap:7px}.chk{color:var(--teal);font-weight:800}
.anim1,.anim2,.anim3,.anim4,.anim5,.anim6{opacity:0;animation:up .7s cubic-bezier(.2,.7,.2,1) forwards}
.anim2{animation-delay:.08s}.anim3{animation-delay:.16s}.anim4{animation-delay:.26s}.anim5{animation-delay:.36s}.anim6{animation-delay:.46s}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.hero-visual{position:absolute;top:70px;right:0;width:360px;opacity:0;animation:up .8s .3s cubic-bezier(.2,.7,.2,1) forwards}
.hv-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:24px;box-shadow:0 30px 70px var(--shadow);transform:rotate(2deg);animation:floaty 6s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:rotate(2deg) translateY(0)}50%{transform:rotate(2deg) translateY(-12px)}}
.hv-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hv-lbl{font-size:12px;color:var(--mut2);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.hv-grade{font-size:11px;font-weight:800;color:var(--teal);background:rgba(23,182,167,.14);padding:4px 9px;border-radius:7px}
.hv-bal{font-family:'Sora';font-size:34px;font-weight:800;color:var(--heading)}
.hv-pl{color:var(--teal);font-weight:700;font-size:15px;margin-bottom:10px}.hv-pl span{color:var(--mut2);font-weight:500}
.hv-spark{width:100%;height:58px;display:block;margin-bottom:12px}
.hv-row{display:flex;justify-content:space-between;font-size:13px;color:var(--mut);padding:8px 0;border-top:1px dashed var(--line)}.hv-row b{color:var(--heading)}
.hv-chip{position:absolute;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 14px;font-size:12.5px;font-weight:700;box-shadow:0 12px 30px var(--shadow);animation:floaty2 5s ease-in-out infinite}
.hv-chip.c1{top:-6px;left:-40px;color:var(--teal)}
.hv-chip.c2{bottom:16px;left:-30px;color:var(--cyan);animation-delay:1s}
@keyframes floaty2{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@media(max-width:1000px){.hero-visual{display:none}.hero-inner{max-width:100%}}
.sh{max-width:680px;margin-bottom:50px}
.sh h2{font-size:clamp(29px,4vw,42px);font-weight:800;margin:14px 0 16px}.sh p{font-size:17px;color:var(--mut)}
.sh.center{margin-left:auto;margin-right:auto;text-align:center}
.cfg{max-width:1000px;margin:0 auto}
.cstep{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin:18px 0 10px}.cstep:first-child{margin-top:0}
.t-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.s-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.p-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.opt{position:relative;border:1px solid var(--line);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:.18s;background:var(--soft);font-size:14px;font-weight:700;color:var(--ink)}
.opt small{display:block;font-weight:500;color:var(--mut2);font-size:11px;margin-top:3px}
.opt.sel{border-color:var(--cyan);background:rgba(28,169,227,.1);box-shadow:0 0 0 1px var(--cyan);transform:translateY(-2px)}
.opt:hover{border-color:rgba(28,169,227,.45);transform:translateY(-2px)}
.opt.proopt{border-color:rgba(23,182,167,.5)}.opt.proopt.sel{box-shadow:0 0 0 1px var(--teal)}
.probadge{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:linear-gradient(120deg,#17B6A7,#1CA9E3);color:#062033;font-size:9px;font-weight:800;letter-spacing:.08em;padding:2px 8px;border-radius:100px}

.rwd p.rwd-note{font-size:11.5px;color:var(--mut2);margin:-6px 0 12px;flex:none;font-style:italic}
.rwd-h{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}.rwd-h b{font-size:14.5px;color:var(--heading)}
.rwd-cost{font-size:12px;font-weight:800;color:var(--cyan);background:rgba(28,169,227,.12);padding:4px 9px;border-radius:100px;white-space:nowrap;flex:none}
.rwd-lock{opacity:.72}
.rwd-row{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;padding:9px 0;border-bottom:1px solid var(--line);color:var(--mut)}.rwd-row:last-child{border-bottom:none}
.rwd-st{text-transform:capitalize;font-weight:700}.rs-approved{color:var(--teal)}.rs-pending_review{color:#D08B12}.rs-denied{color:#E5604D}
@media(max-width:900px){.rwd-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.rwd-grid{grid-template-columns:1fr}}
/* admin test mode */
.testbar{background:linear-gradient(120deg,rgba(23,182,167,.14),rgba(28,169,227,.12));border:1px solid rgba(23,182,167,.4);color:var(--ink);font-size:13.5px;font-weight:600;padding:11px 16px;border-radius:12px;margin-bottom:18px}
.admtest{margin-top:14px;padding:14px;border:1px dashed rgba(23,182,167,.5);border-radius:12px;background:rgba(23,182,167,.06)}
.admtest-h{font-weight:800;font-size:13.5px;margin-bottom:6px;color:var(--teal)}
.admtest p{font-size:12.5px;color:var(--mut);margin-bottom:10px}
/* tradegrade review */
.tg-cta,.tg-err{max-width:720px;margin:0 auto;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:38px 30px;box-shadow:0 8px 26px var(--shadow)}
.tg-cta h2{font-size:clamp(22px,3vw,30px);font-weight:800;margin-bottom:12px}
.tg-cta p{color:var(--mut);font-size:15px;margin-bottom:22px}
.tg-err{text-align:left}.tg-err b{color:#E5604D}.tg-err p{color:var(--mut);font-size:14px;margin:8px 0}.tg-err code{background:var(--soft2);padding:1px 6px;border-radius:5px;font-size:12.5px}
.tg-review{max-width:900px;margin:0 auto}
.tg-hero{display:flex;gap:22px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px;box-shadow:0 8px 26px var(--shadow);margin-bottom:20px}
.tg-grade-badge{flex:none;width:88px;height:88px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-family:'Sora';font-size:44px;font-weight:800;color:#062033;background:var(--grad);box-shadow:0 10px 30px rgba(28,169,227,.35)}
.tg-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.tg-metric{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--mut2);border-radius:12px;padding:14px}
.tg-metric .tg-m-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700;margin-bottom:6px}
.tg-metric .tg-m-top b{text-transform:capitalize;font-size:11px;padding:2px 8px;border-radius:100px}
.tg-metric p{font-size:12.5px;color:var(--mut);line-height:1.5}
.tg-strong{border-left-color:var(--teal)}.tg-strong .tg-m-top b{background:rgba(23,182,167,.16);color:var(--teal)}
.tg-solid{border-left-color:var(--cyan)}.tg-solid .tg-m-top b{background:rgba(28,169,227,.16);color:var(--cyan)}
.tg-watch{border-left-color:#D08B12}.tg-watch .tg-m-top b{background:rgba(208,139,18,.16);color:#D08B12}
.tg-weak{border-left-color:#E5604D}.tg-weak .tg-m-top b{background:rgba(229,96,77,.16);color:#E5604D}
.tg-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.tg-col{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px}
.tg-col h3{font-size:16px;font-weight:800;margin-bottom:12px}
.tg-col ul{list-style:none;display:flex;flex-direction:column;gap:9px}
.tg-col li{display:flex;gap:9px;font-size:14px;color:var(--ink);align-items:flex-start}
.tg-col .chk{color:var(--teal);font-weight:800}.tg-col .fdot{color:var(--cyan);font-weight:800}
.tg-study{background:linear-gradient(150deg,rgba(28,169,227,.07),rgba(23,182,167,.05));border:1px solid var(--line);border-radius:16px;padding:22px}
.tg-study-h{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tg-study-h h3{font-size:17px;font-weight:800}.tg-study-h span{font-size:11.5px;color:var(--mut2);font-weight:600}
.tg-study-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.tg-study-card{display:block;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;transition:.18s}
.tg-study-card:hover{border-color:var(--cyan);transform:translateY(-2px)}
.tg-kind{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--cyan);background:rgba(28,169,227,.12);padding:2px 8px;border-radius:100px;margin-bottom:8px}
.tg-study-card b{display:block;font-size:14px;margin-bottom:4px}.tg-study-card p{font-size:12.5px;color:var(--mut)}
.tg-refresh{text-align:center;margin-top:20px}
@media(max-width:760px){.tg-metrics,.tg-study-grid{grid-template-columns:1fr 1fr}.tg-cols{grid-template-columns:1fr}.tg-hero{flex-direction:column;text-align:center}}
@media(max-width:520px){.tg-metrics,.tg-study-grid{grid-template-columns:1fr}}
/* admin console redemption rows */
.admrow{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:12px 4px;border-bottom:1px solid var(--line);flex-wrap:wrap}.admrow:last-child{border-bottom:none}
.admrow-info{display:flex;align-items:center;gap:12px;font-size:14px}
.admrow-info .admid{font-family:'Sora';font-size:12px;color:var(--mut2)}
.admrow-info b{font-weight:800}
.admrow-info .admpts{font-size:12px;font-weight:700;color:var(--cyan);background:rgba(28,169,227,.12);padding:3px 9px;border-radius:100px}
.admrow-act{display:flex;align-items:center;gap:8px}
.admrow-act select{background:var(--soft2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:12.5px;font-weight:600}
.mini.danger{border-color:rgba(229,96,77,.5);color:#E5604D}.mini.danger:hover{background:rgba(229,96,77,.12)}
.rwd-msg.ok{color:var(--teal)}
.drill{margin-top:26px;border:1px solid var(--line);border-radius:16px;padding:20px 22px;background:var(--soft)}
.drill-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.drill-head h2{font-size:18px;font-weight:800}
.drill-sec{font-size:11.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--cyan);margin:20px 0 8px}
.drill-empty{font-size:13px;color:var(--mut);padding:6px 0}
.srcpill{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.04em;padding:2px 7px;border-radius:100px;margin-right:4px}
.src-tdc{background:rgba(176,38,255,.14);color:#B026FF}.src-hp{background:rgba(23,182,167,.16);color:var(--teal)}
.narrrow td{background:var(--soft);color:var(--mut);font-size:12.5px;line-height:1.55;padding:12px 14px!important;white-space:normal}
.tg-cadence{font-size:12px;color:var(--mut2);margin-top:10px;max-width:520px;margin-left:auto;margin-right:auto}
/* HP challenge progress */
.hp-chal{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px 24px;margin-bottom:22px;box-shadow:0 8px 26px var(--shadow)}
.hp-chal-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.hp-chal-head h2{font-size:clamp(20px,3vw,26px);font-weight:800;margin-top:4px}
.hp-chal-acct{font-size:13px;color:var(--mut);font-weight:600}
.hp-chal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.hp-chal-item{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:13px 14px}
.hp-ci-top{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;font-weight:600;color:var(--mut);margin-bottom:8px}
.hp-ci-top b{font-size:14px;color:var(--ink);font-weight:800}
.hp-ci-sub{font-size:11px;color:var(--mut2);margin-top:7px}
.hp-ok{color:var(--teal)!important}.hp-no{color:#E5604D!important}
.hp-prog{height:7px;border-radius:100px;background:var(--soft2);overflow:hidden}
.hp-prog-fill{height:100%;border-radius:100px;transition:width .4s}
.hp-cal{margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.hp-cal-h{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--cyan);margin-bottom:10px}
.hp-cal-row{display:flex;gap:8px;flex-wrap:wrap}
.hp-cal-cell{display:flex;flex-direction:column;min-width:80px;border-radius:10px;padding:9px 11px;border:1px solid var(--line)}
.hp-cal-cell.pos{background:rgba(23,182,167,.10);border-color:rgba(23,182,167,.3)}
.hp-cal-cell.neg{background:rgba(229,96,77,.09);border-color:rgba(229,96,77,.28)}
.hp-cal-day{font-size:10.5px;color:var(--mut2);font-weight:600}
.hp-cal-amt{font-size:14px;font-weight:800;margin-top:2px}
.hp-cal-pct{font-size:11px;color:var(--mut);margin-top:1px}
.hp-tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.hp-tile{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 15px}
.hp-tile-k{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut2);font-weight:600}
.hp-tile-v{font-size:21px;font-weight:800;margin-top:5px}
.hp-tile-s{font-size:11px;color:var(--mut);margin-top:3px}
.hp-charts{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.hp-chart{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.hp-chart-h{font-size:15px;font-weight:800}
.hp-chart-s{font-size:12px;color:var(--mut);margin:2px 0 10px}
@media(max-width:820px){.hp-chal-grid{grid-template-columns:1fr 1fr}.hp-tiles{grid-template-columns:repeat(2,1fr)}.hp-charts{grid-template-columns:1fr}}
@media(max-width:480px){.hp-chal-grid,.hp-tiles{grid-template-columns:1fr}}
