<!DOCTYPE html><html lang="en" data-theme="light"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<!-- Update the worker host below if you deploy tradetrim-portal to a different Cloudflare account. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com data:; img-src 'self' data:; connect-src https://*.supabase.co https://tradetrim-portal.demetricode.workers.dev; frame-ancestors 'none'; base-uri 'none'"/>
<meta name="referrer" content="strict-origin-when-cross-origin"/>
<meta name="robots" content="noindex, nofollow"/>
<title>TradeTrim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:#0e1420;color:#eef2f7;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center}
#gate{width:100%;max-width:380px;padding:34px 28px;margin:24px;background:rgba(255,255,255,.03);border:1px solid rgba(120,160,210,.16);border-radius:16px;text-align:center}
#gate img{height:60px;width:auto;max-width:100%;margin-bottom:20px;background:transparent}
.gt{font-weight:700;font-size:20px;margin:0 0 4px;letter-spacing:-.01em}
.gs{font-size:13px;color:#9aa8bd;margin:0 0 22px;line-height:1.5}
#gate input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(120,160,210,.2);border-radius:10px;padding:12px 14px;color:#eef2f7;font-size:14px;margin-bottom:11px;outline:none}
#gate input:focus{border-color:#3d7bd9}
#gate button{width:100%;background:linear-gradient(120deg,#087F78,#26BEB2);color:#fff;font-weight:600;border:none;border-radius:10px;padding:13px;font-size:15px;cursor:pointer;margin-top:4px}
#gate button:disabled{opacity:.6;cursor:default}
#err{color:#ff9a9a;font-size:12.5px;margin-top:12px;min-height:16px}
.priv{font-size:11px;color:#6d7c92;margin-top:18px}
</style></head>
<body>
<form id="gate" autocomplete="on">
  <img src="/brand/TradeTrim-preview.svg" alt="TradeTrim" onerror="this.style.display='none'"/>
  <p class="gt">TradeTrim &mdash; private preview</p>
  <p class="gs">Sign in to enter the TradeTrim staging portal.</p>
  <input id="e" type="email" placeholder="Email" autocomplete="username" />
  <input id="p" type="password" placeholder="Password" autocomplete="current-password" />
  <button id="b" type="submit">Enter</button>
  <div id="err"></div>
  <div class="priv">Authorized accounts only. Not for public distribution.</div>
</form>
<script>
(function(){
  var SB="https://skdqhfjyyivzbztcqpfl.supabase.co",
      ANON="sb_publishable__lx5hl1E5AMtKAKzrc2arw_Sp61KIY4",
      WK="https://tradetrim-portal.demetricode.workers.dev";
  var f=document.getElementById("gate"), err=document.getElementById("err"), btn=document.getElementById("b");
  f.addEventListener("submit", async function(ev){
    ev.preventDefault(); err.textContent=""; btn.disabled=true; btn.textContent="Verifying...";
    var email=document.getElementById("e").value.trim(), pw=document.getElementById("p").value;
    try{
      if(!email||!pw){ throw new Error("Enter your email and password."); }
      var t=await fetch(SB+"/auth/v1/token?grant_type=password",{method:"POST",headers:{apikey:ANON,"Content-Type":"application/json"},body:JSON.stringify({email:email,password:pw})});
      var d=await t.json().catch(function(){return {};});
      if(!t.ok||!d.access_token){ throw new Error(d.error_description||d.msg||"Invalid email or password."); }
      var a=await fetch(WK,{headers:{Authorization:"Bearer "+d.access_token}});
      if(a.status===403){ throw new Error("This account is not authorized for the preview."); }
      if(!a.ok){ throw new Error("Access could not be verified. Please contact support."); }
      var js=await a.text();
      f.remove();
      var s=document.createElement("script"); s.textContent=js; document.body.appendChild(s);
    }catch(e){
      err.textContent=String(e.message||e); btn.disabled=false; btn.textContent="Enter";
    }
  });
})();
</script>
</body></html>
